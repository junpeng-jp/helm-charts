{{- if and .Values.persistence.existingClaim .Values.persistence.existingVolume }}
{{- fail "persistence.existingClaim and persistence.existingVolume are mutually exclusive; set at most one" }}
{{- end }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "home-assistant.fullname" . }}
  labels:
    {{- include "home-assistant.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "home-assistant.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "home-assistant.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "home-assistant.selectorLabels" . | nindent 8 }}
      {{- with .Values.pod.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      hostNetwork: {{ .Values.pod.hostNetwork }}
      {{- if .Values.pod.hostNetwork }}
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      serviceAccountName: {{ include "home-assistant.serviceAccountName" . }}
      {{- with .Values.global.image.pullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      {{- if or .Values.initContainers .Values.homeAssistant.initContainer.tasks.setupHACS .Values.homeAssistant.initContainer.tasks.createSecretsYAML (and .Values.homeAssistant.config.enabled .Values.homeAssistant.config.checkConfig.enabled) }}
      initContainers:
        {{- with .Values.initContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.homeAssistant.initContainer.tasks.setupHACS }}
        - name: install-hacs
          image: docker.io/alpine:3.21
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -e
              URL="https://github.com/hacs/integration/releases/latest/download/hacs.zip"
              if [ ! -d /config/custom_components/hacs ]; then
                apk add -q --no-progress unzip
                mkdir -p /config/custom_components/hacs
                wget -q -O /tmp/hacs.zip "$URL"
                unzip -q /tmp/hacs.zip -d /config/custom_components/hacs
              fi
          volumeMounts:
            - name: config
              mountPath: /config
        {{- end }}
        {{- if .Values.homeAssistant.initContainer.tasks.createSecretsYAML }}
        - name: generate-secrets-yaml
          image: {{ include "home-assistant.initContainer.image" . }}
          imagePullPolicy: {{ .Values.homeAssistant.initContainer.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              set -e
              out=/config/secrets.yaml
              : > "$out"
              for f in /run/secrets/{{ .Values.homeAssistant.initContainer.tasks.createSecretsYAML }}/*; do
                [ -f "$f" ] || continue
                printf '%s: %s\n' "$(basename "$f")" "$(cat "$f")" >> "$out"
              done
          volumeMounts:
            - name: config
              mountPath: /config
            - name: {{ .Values.homeAssistant.initContainer.tasks.createSecretsYAML }}
              mountPath: /run/secrets/{{ .Values.homeAssistant.initContainer.tasks.createSecretsYAML }}
              readOnly: true
        {{- end }}
        {{- if and .Values.homeAssistant.config.enabled .Values.homeAssistant.config.checkConfig.enabled }}
        - name: check-config
          image: {{ include "home-assistant.image" . }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          command:
            - python
            - -m
            - homeassistant
            - --script
            - check_config
            - --config
            - /config
          volumeMounts:
            - name: config
              mountPath: /config
            - name: ha-config
              mountPath: /config/configuration.yaml
              subPath: configuration.yaml
              readOnly: true
        {{- end }}
      {{- end }}
      containers:
        - name: home-assistant
          image: {{ include "home-assistant.image" . }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            {{- range $svcName := keys .Values.networking.service | sortAlpha }}
            {{- $svc := index $.Values.networking.service $svcName }}
            {{- if $svc.enabled }}
            {{- range $portName := keys $svc.ports | sortAlpha }}
            {{- $port := index $svc.ports $portName }}
            {{- if (default true $port.enabled) }}
            - name: {{ $portName }}
              containerPort: {{ $port.port }}
              protocol: {{ $port.protocol }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- end }}
          {{- with .Values.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            {{- omit .Values.startupProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            {{- omit .Values.livenessProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            {{- omit .Values.readinessProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: config
              mountPath: /config
            {{- end }}
            {{- if .Values.homeAssistant.config.enabled }}
            - name: ha-config
              mountPath: /config/configuration.yaml
              subPath: configuration.yaml
              readOnly: true
            {{- end }}
            {{- if .Values.homeAssistant.packages.enabled }}
            - name: ha-packages
              mountPath: /config/packages
              readOnly: true
            {{- end }}
            {{- if .Values.homeAssistant.themes.enabled }}
            - name: ha-themes
              mountPath: /config/themes
              readOnly: true
            {{- end }}
            {{- if .Values.homeAssistant.initContainer.tasks.createSecretsYAML }}
            - name: {{ .Values.homeAssistant.initContainer.tasks.createSecretsYAML }}
              mountPath: /run/secrets/{{ .Values.homeAssistant.initContainer.tasks.createSecretsYAML }}
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- if or (and .Values.persistence.enabled .Values.persistence.existingClaim) .Values.homeAssistant.config.enabled .Values.homeAssistant.packages.enabled .Values.homeAssistant.themes.enabled .Values.homeAssistant.initContainer.tasks.createSecretsYAML .Values.extraVolumes }}
      volumes:
        {{- if and .Values.persistence.enabled .Values.persistence.existingClaim }}
        - name: config
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim }}
        {{- end }}
        {{- if .Values.homeAssistant.config.enabled }}
        - name: ha-config
          configMap:
            name: {{ .Values.homeAssistant.config.existingConfigMap | default (printf "%s-config" (include "home-assistant.fullname" .)) }}
        {{- end }}
        {{- if .Values.homeAssistant.packages.enabled }}
        - name: ha-packages
          configMap:
            name: {{ .Values.homeAssistant.packages.existingConfigMap | default (printf "%s-packages" (include "home-assistant.fullname" .)) }}
        {{- end }}
        {{- if .Values.homeAssistant.themes.enabled }}
        - name: ha-themes
          configMap:
            name: {{ .Values.homeAssistant.themes.existingConfigMap | default (printf "%s-themes" (include "home-assistant.fullname" .)) }}
        {{- end }}
        {{- if .Values.homeAssistant.initContainer.tasks.createSecretsYAML }}
        - name: {{ .Values.homeAssistant.initContainer.tasks.createSecretsYAML }}
          secret:
            secretName: {{ .Values.homeAssistant.initContainer.tasks.createSecretsYAML }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.pod.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pod.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pod.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) }}
  volumeClaimTemplates:
    - metadata:
        name: config
        {{- with .Values.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        labels:
          {{- merge (include "home-assistant.labels" . | fromYaml) .Values.persistence.labels | toYaml | nindent 10 }}
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
        {{- if .Values.persistence.existingVolume }}
        volumeName: {{ .Values.persistence.existingVolume }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
