apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "home-assistant.fullname" . }}
  labels:
    {{- include "home-assistant.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "home-assistant.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "home-assistant.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "home-assistant.selectorLabels" . | nindent 8 }}
      {{- with .Values.pod.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      hostNetwork: {{ .Values.pod.hostNetwork }}
      {{- if .Values.pod.hostNetwork }}
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      serviceAccountName: {{ include "home-assistant.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.image.pullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      {{- with .Values.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: home-assistant
          image: {{ include "home-assistant.image" . }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            {{- range $svcName := keys .Values.networking.service | sortAlpha }}
            {{- $svc := index $.Values.networking.service $svcName }}
            {{- if $svc.enabled }}
            {{- range $portName := keys $svc.ports | sortAlpha }}
            {{- $port := index $svc.ports $portName }}
            {{- if (default true $port.enabled) }}
            - name: {{ $portName }}
              containerPort: {{ $port.port }}
              protocol: {{ $port.protocol }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- end }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            {{- omit .Values.livenessProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            {{- omit .Values.readinessProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: config
              mountPath: /config
            {{- end }}
            {{- if .Values.homeAssistant.config.enabled }}
            - name: ha-config
              mountPath: /config/configuration.yaml
              subPath: configuration.yaml
              readOnly: true
            {{- end }}
            {{- if .Values.homeAssistant.packages.enabled }}
            - name: ha-packages
              mountPath: /config/packages
              readOnly: true
            {{- end }}
            {{- range $i, $dev := .Values.homeAssistant.usbDevices }}
            - name: usb-device-{{ $i }}
              mountPath: {{ $dev.mountPath }}
            {{- end }}
            {{- range .Values.secretVolumeMounts }}
            - name: {{ default .secretName .name }}
              mountPath: {{ .mountPath | default (printf "/run/secrets/%s" .secretName) }}
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- if or (and .Values.persistence.enabled .Values.persistence.existingClaim) .Values.homeAssistant.config.enabled .Values.homeAssistant.packages.enabled .Values.homeAssistant.usbDevices .Values.secretVolumeMounts .Values.extraVolumes }}
      volumes:
        {{- if and .Values.persistence.enabled .Values.persistence.existingClaim }}
        - name: config
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim }}
        {{- end }}
        {{- if .Values.homeAssistant.config.enabled }}
        - name: ha-config
          configMap:
            name: {{ include "home-assistant.fullname" . }}-config
        {{- end }}
        {{- if .Values.homeAssistant.packages.enabled }}
        - name: ha-packages
          configMap:
            name: {{ include "home-assistant.fullname" . }}-packages
        {{- end }}
        {{- range $i, $dev := .Values.homeAssistant.usbDevices }}
        - name: usb-device-{{ $i }}
          hostPath:
            path: {{ $dev.hostPath }}
        {{- end }}
        {{- range .Values.secretVolumeMounts }}
        - name: {{ default .secretName .name }}
          secret:
            secretName: {{ .secretName }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.pod.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pod.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pod.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) }}
  volumeClaimTemplates:
    - metadata:
        name: config
        {{- with .Values.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        labels:
          {{- merge (include "home-assistant.labels" . | fromYaml) (.Values.persistence.labels | default dict) | toYaml | nindent 10 }}
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
