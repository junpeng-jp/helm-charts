apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "home-assistant.fullname" . }}
  labels:
    {{- include "home-assistant.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "home-assistant.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "home-assistant.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "home-assistant.selectorLabels" . | nindent 8 }}
      {{- with .Values.pod.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      hostNetwork: {{ .Values.pod.hostNetwork }}
      {{- if .Values.pod.hostNetwork }}
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      serviceAccountName: {{ include "home-assistant.serviceAccountName" . }}
      {{- with .Values.global.image.pullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      {{- if or .Values.initContainers .Values.homeAssistant.initContainer.tasks.setupHACS.enabled .Values.homeAssistant.initContainer.tasks.setupSecretsYaml.enabled .Values.homeAssistant.config.enabled .Values.homeAssistant.packages.enabled .Values.homeAssistant.themes.enabled }}
      initContainers:
        {{- with .Values.initContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.homeAssistant.initContainer.tasks.setupHACS.enabled }}
        - name: install-hacs
          image: {{ include "home-assistant.initContainer.image" . }}
          imagePullPolicy: {{ .Values.homeAssistant.initContainer.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              set -e
              URL="https://github.com/hacs/integration/releases/download/{{ .Values.homeAssistant.initContainer.tasks.setupHACS.version }}/hacs.zip"
              if [ ! -d /config/custom_components/hacs ]; then
                apk add -q --no-progress unzip
                mkdir -p /config/custom_components/hacs
                wget -q -O /tmp/hacs.zip "$URL"
                unzip -q /tmp/hacs.zip -d /config/custom_components/hacs
              fi
          volumeMounts:
            - name: config
              mountPath: /config
        {{- end }}
        {{- if .Values.homeAssistant.initContainer.tasks.setupSecretsYaml.enabled }}
        - name: generate-secrets-yaml
          image: {{ include "home-assistant.initContainer.image" . }}
          imagePullPolicy: {{ .Values.homeAssistant.initContainer.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              set -e
              SECRET_DIR=/run/secrets/{{ .Values.homeAssistant.initContainer.tasks.setupSecretsYaml.secretName }}
              printf '' > /config/secrets.yaml
              for f in "$SECRET_DIR"/*; do
                [ -f "$f" ] || continue
                printf '%s: %s\n' "$(basename "$f")" "$(cat "$f")" >> /config/secrets.yaml
              done
          volumeMounts:
            - name: config
              mountPath: /config
            - name: {{ .Values.homeAssistant.initContainer.tasks.setupSecretsYaml.secretName }}
              mountPath: /run/secrets/{{ .Values.homeAssistant.initContainer.tasks.setupSecretsYaml.secretName }}
              readOnly: true
        {{- end }}
        {{- if or .Values.homeAssistant.config.enabled .Values.homeAssistant.packages.enabled .Values.homeAssistant.themes.enabled }}
        - name: copy-config
          image: {{ include "home-assistant.initContainer.image" . }}
          imagePullPolicy: {{ .Values.homeAssistant.initContainer.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              set -e
              {{- if .Values.homeAssistant.config.enabled }}
              cp /run/ha-config/configuration.yaml /config/configuration.yaml
              {{- end }}
              {{- if .Values.homeAssistant.packages.enabled }}
              mkdir -p /config/packages
              find /config/packages -maxdepth 1 -type f -delete
              cp /run/ha-packages/* /config/packages/
              {{- end }}
              {{- if .Values.homeAssistant.themes.enabled }}
              mkdir -p /config/themes
              find /config/themes -maxdepth 1 -type f -delete
              cp /run/ha-themes/* /config/themes/
              {{- end }}
          volumeMounts:
            - name: config
              mountPath: /config
            {{- if .Values.homeAssistant.config.enabled }}
            - name: ha-config
              mountPath: /run/ha-config
              readOnly: true
            {{- end }}
            {{- if .Values.homeAssistant.packages.enabled }}
            - name: ha-packages
              mountPath: /run/ha-packages
              readOnly: true
            {{- end }}
            {{- if .Values.homeAssistant.themes.enabled }}
            - name: ha-themes
              mountPath: /run/ha-themes
              readOnly: true
            {{- end }}
        {{- end }}
        {{- if and .Values.homeAssistant.config.enabled .Values.homeAssistant.config.checkConfig.enabled }}
        - name: check-config
          image: {{ include "home-assistant.image" . }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          command:
            - hass
            - --script
            - check_config
            - --config
            - /config
          volumeMounts:
            - name: config
              mountPath: /config
        {{- end }}
      {{- end }}
      # Security context omitted — home-assistant requires root to access host devices and manage /config.
      containers:
        - name: home-assistant
          image: {{ include "home-assistant.image" . }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            {{- range $svcName := keys .Values.networking.service | sortAlpha }}
            {{- $svc := index $.Values.networking.service $svcName }}
            {{- if $svc.enabled }}
            {{- range $portName := keys $svc.ports | sortAlpha }}
            {{- $port := index $svc.ports $portName }}
            {{- if (default true $port.enabled) }}
            - name: {{ $portName }}
              containerPort: {{ $port.port }}
              protocol: {{ $port.protocol }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- end }}
          {{- with .Values.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            {{- omit .Values.startupProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            {{- omit .Values.livenessProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            {{- omit .Values.readinessProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: config
              mountPath: /config
            {{- end }}
            {{- range .Values.secretVolumeMounts }}
            - name: {{ .name | default .secretName }}
              mountPath: /run/secrets/{{ .mountPath | default .secretName }}
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- if or (and .Values.persistence.enabled .Values.persistence.existingClaim) .Values.homeAssistant.config.enabled .Values.homeAssistant.packages.enabled .Values.homeAssistant.themes.enabled .Values.homeAssistant.initContainer.tasks.setupSecretsYaml.enabled .Values.secretVolumeMounts .Values.extraVolumes }}
      volumes:
        {{- if and .Values.persistence.enabled .Values.persistence.existingClaim }}
        - name: config
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim }}
        {{- end }}
        {{- if .Values.homeAssistant.config.enabled }}
        - name: ha-config
          configMap:
            name: {{ .Values.homeAssistant.config.existingConfigMap }}
        {{- end }}
        {{- if .Values.homeAssistant.packages.enabled }}
        - name: ha-packages
          configMap:
            name: {{ .Values.homeAssistant.packages.existingConfigMap }}
        {{- end }}
        {{- if .Values.homeAssistant.themes.enabled }}
        - name: ha-themes
          configMap:
            name: {{ .Values.homeAssistant.themes.existingConfigMap }}
        {{- end }}
        {{- if .Values.homeAssistant.initContainer.tasks.setupSecretsYaml.enabled }}
        - name: {{ .Values.homeAssistant.initContainer.tasks.setupSecretsYaml.secretName }}
          secret:
            secretName: {{ .Values.homeAssistant.initContainer.tasks.setupSecretsYaml.secretName }}
        {{- end }}
        {{- range .Values.secretVolumeMounts }}
        - name: {{ .name | default .secretName }}
          secret:
            secretName: {{ .secretName }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.pod.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pod.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pod.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) }}
  volumeClaimTemplates:
    - metadata:
        name: config
        {{- with .Values.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        labels:
          {{- merge (include "home-assistant.labels" . | fromYaml) .Values.persistence.labels | toYaml | nindent 10 }}
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
        {{- if .Values.persistence.existingVolume }}
        volumeName: {{ .Values.persistence.existingVolume }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
