apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "home-assistant.fullname" . }}
  labels:
    {{- include "home-assistant.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "home-assistant.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: {{ .Values.podManagementPolicy }}
  updateStrategy:
    {{- toYaml .Values.updateStrategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "home-assistant.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "home-assistant.selectorLabels" . | nindent 8 }}
      {{- with .Values.pod.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      hostNetwork: {{ .Values.pod.hostNetwork }}
      {{- if .Values.pod.hostNetwork }}
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      serviceAccountName: {{ include "home-assistant.serviceAccountName" . }}
      {{- with .Values.global.image.pullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      {{- if or .Values.homeAssistant.gitops.enabled .Values.initContainers (include "home-assistant.bootstrapEnabled" .) }}
      initContainers:
        {{- if .Values.homeAssistant.gitops.enabled }}
        - name: gitops-setup
          image: {{ include "home-assistant.initContainer.image" . }}
          imagePullPolicy: {{ .Values.homeAssistant.initContainer.image.pullPolicy }}
          securityContext:
            runAsUser: 0
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          command:
            - sh
            - -c
            - |
              set -e
              mkdir -p /config/gitops/scripts
              {{- range .Values.homeAssistant.gitops.repos }}
              mkdir -p /config/gitops/{{ .name }}
              printf '%s\n' {{ .url | quote }} > /config/gitops/{{ .name }}/remote
              {{- end }}
          {{- with .Values.homeAssistant.initContainer.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- /* config volume always present: gitops.enabled → persistence.enabled (validated) */}}
            - name: config
              mountPath: /config
        {{- end }}
        {{- if include "home-assistant.bootstrapEnabled" . }}
        - name: bootstrap
          image: {{ include "home-assistant.initContainer.image" . }}
          imagePullPolicy: {{ .Values.homeAssistant.initContainer.image.pullPolicy }}
          securityContext:
            runAsUser: 0
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          command: [sh, /run/init-scripts/bootstrap.sh]
          env:
            {{- if .Values.homeAssistant.initContainer.tasks.setupHACS.enabled }}
            - name: HACS_ENABLED
              value: "true"
            - name: HACS_VERSION
              value: {{ .Values.homeAssistant.initContainer.tasks.setupHACS.version | quote }}
            {{- if .Values.homeAssistant.initContainer.tasks.setupHACS.sha256 }}
            - name: HACS_SHA256
              value: {{ .Values.homeAssistant.initContainer.tasks.setupHACS.sha256 | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.homeAssistant.initContainer.tasks.setupSecretsYaml.enabled }}
            - name: SECRETS_ENABLED
              value: "true"
            - name: SECRETS_DIR
              value: "/run/secrets/{{ .Values.homeAssistant.initContainer.tasks.setupSecretsYaml.secretName }}"
            {{- end }}
            {{- if .Values.homeAssistant.configuration.enabled }}
            - name: CONFIG_ENABLED
              value: "true"
            {{- end }}
          {{- with .Values.homeAssistant.initContainer.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /config
            - name: init-scripts
              mountPath: /run/init-scripts
              readOnly: true
            {{- if .Values.homeAssistant.initContainer.tasks.setupSecretsYaml.enabled }}
            - name: {{ .Values.homeAssistant.initContainer.tasks.setupSecretsYaml.secretName }}
              mountPath: /run/secrets/{{ .Values.homeAssistant.initContainer.tasks.setupSecretsYaml.secretName }}
              readOnly: true
            {{- end }}
            {{- if .Values.homeAssistant.configuration.enabled }}
            - name: ha-bootstrap-config
              mountPath: /run/ha-bootstrap-config
              readOnly: true
            {{- end }}
        {{- end }}
        {{- with .Values.initContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if and .Values.homeAssistant.configuration.enabled .Values.homeAssistant.configuration.checkConfig.enabled }}
        - name: check-config
          image: {{ include "home-assistant.image" . }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: [ALL]
          command:
            - hass
            - --script
            - check_config
            - --config
            - /config
          {{- with .Values.homeAssistant.configuration.checkConfig.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /config
        {{- end }}
      {{- end }}
      containers:
        - name: home-assistant
          image: {{ include "home-assistant.image" . }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          # Security context omitted — home-assistant uses s6-overlay which must start as root.
          {{- with include "home-assistant.containerPorts" . | trim }}
          ports:
            {{- . | nindent 12 }}
          {{- end }}
          {{- with .Values.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            {{- omit .Values.startupProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            {{- omit .Values.livenessProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            {{- omit .Values.readinessProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: config
              mountPath: /config
            {{- end }}
            {{- if .Values.homeAssistant.gitops.enabled }}
            - name: gitops-sync-script
              mountPath: /config/gitops/scripts/sync.sh
              subPath: sync.sh
              readOnly: true
            - name: gitops-known-hosts
              mountPath: /run/secrets/gitops/known_hosts
              subPath: known_hosts
              readOnly: true
            - name: gitops-ssh-key
              mountPath: /run/secrets/gitops/ssh_key
              subPath: {{ .Values.homeAssistant.gitops.sshKeyName }}
              readOnly: true
            - name: gitops-ha-check
              mountPath: /run/ha-check
            {{- if .Values.homeAssistant.gitops.allowedSigners }}
            - name: gitops-allowed-signers
              mountPath: /run/secrets/gitops/allowed_signers
              subPath: allowed_signers
              readOnly: true
            {{- end }}
            {{- end }}
            {{- range .Values.secretVolumeMounts }}
            - name: {{ .name | default .secretName }}
              mountPath: /run/secrets/{{ .mountPath | default .secretName }}
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        {{- if .Values.persistence.existingClaim }}
        - name: config
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim }}
        {{- end }}
        {{- if .Values.homeAssistant.configuration.enabled }}
        - name: ha-bootstrap-config
          configMap:
            name: {{ include "home-assistant.fullname" . }}-configuration
        {{- end }}
        {{- if include "home-assistant.bootstrapEnabled" . }}
        - name: init-scripts
          configMap:
            name: {{ include "home-assistant.fullname" . }}-init-scripts
            defaultMode: 0755
        {{- end }}
        {{- if .Values.homeAssistant.gitops.enabled }}
        - name: gitops-sync-script
          configMap:
            name: {{ include "home-assistant.fullname" . }}-gitops-sync-script
            defaultMode: 0755
        - name: gitops-known-hosts
          configMap:
            name: {{ include "home-assistant.fullname" . }}-gitops-known-hosts
        - name: gitops-ssh-key
          secret:
            secretName: {{ .Values.homeAssistant.gitops.sshKeySecret }}
            defaultMode: 0400
        - name: gitops-ha-check
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.homeAssistant.gitops.checkDirSizeLimit }}
        {{- if .Values.homeAssistant.gitops.allowedSigners }}
        - name: gitops-allowed-signers
          configMap:
            name: {{ include "home-assistant.fullname" . }}-gitops-allowed-signers
        {{- end }}
        {{- end }}
        {{- if .Values.homeAssistant.initContainer.tasks.setupSecretsYaml.enabled }}
        - name: {{ .Values.homeAssistant.initContainer.tasks.setupSecretsYaml.secretName }}
          secret:
            secretName: {{ .Values.homeAssistant.initContainer.tasks.setupSecretsYaml.secretName }}
        {{- end }}
        {{- range .Values.secretVolumeMounts }}
        - name: {{ .name | default .secretName }}
          secret:
            secretName: {{ .secretName }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.pod.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pod.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pod.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) }}
  volumeClaimTemplates:
    - metadata:
        name: config
        {{- with .Values.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        labels:
          {{- merge (include "home-assistant.labels" . | fromYaml) (.Values.persistence.labels | default dict) | toYaml | nindent 10 }}
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- else if .Values.persistence.existingVolume }}
        storageClassName: ""
        {{- end }}
        {{- if .Values.persistence.existingVolume }}
        volumeName: {{ .Values.persistence.existingVolume }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
