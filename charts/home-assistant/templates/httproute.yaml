{{- if and .Values.ingress.gateway.enabled .Values.ingress.traefik.enabled }}
{{- fail "Only one ingress mechanism may be enabled at a time (ingress.gateway or ingress.traefik)" }}
{{- end }}
{{- if .Values.ingress.gateway.enabled }}
{{- if not .Values.networking.service.app.enabled }}
{{- fail "ingress.gateway requires networking.service.app to be enabled" }}
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "home-assistant.fullname" . }}
  labels:
    {{- include "home-assistant.labels" . | nindent 4 }}
spec:
  parentRefs:
    {{- toYaml .Values.ingress.gateway.parentRefs | nindent 4 }}
  hostnames:
    {{- toYaml .Values.ingress.gateway.hostnames | nindent 4 }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "home-assistant.fullname" . }}
          port: {{ (index .Values.networking.service.app.ports "http").port }}
{{- end }}
