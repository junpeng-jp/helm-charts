# ingress
{{- if and .Values.ingress.traefik.tls.enabled (not .Values.ingress.traefik.tls.secretName) (not .Values.ingress.traefik.tls.certResolver) }}
{{- fail "ingress.traefik.tls.enabled requires either ingress.traefik.tls.secretName or ingress.traefik.tls.certResolver to be set" }}
{{- end }}

# persistence
{{- if and .Values.persistence.existingClaim .Values.persistence.existingVolume }}
{{- fail "persistence.existingClaim and persistence.existingVolume are mutually exclusive; set at most one" }}
{{- end }}
{{- if and .Values.persistence.existingClaim (not .Values.persistence.enabled) }}
{{- fail "persistence.existingClaim has no effect when persistence.enabled is false; set persistence.enabled: true" }}
{{- end }}
{{- if and .Values.persistence.existingVolume (not .Values.persistence.enabled) }}
{{- fail "persistence.existingVolume has no effect when persistence.enabled is false; set persistence.enabled: true" }}
{{- end }}
{{- if and .Values.persistence.enabled (gt (int .Values.replicaCount) 1) (has "ReadWriteOnce" .Values.persistence.accessModes) }}
{{- fail "replicaCount > 1 is incompatible with ReadWriteOnce storage; use ReadWriteMany or set replicaCount: 1" }}
{{- end }}

# features that require persistence
{{- $needsPersistence := list
    (dict "enabled" .Values.homeAssistant.initContainer.tasks.setupHACS.enabled        "msg" "homeAssistant.initContainer.tasks.setupHACS requires persistence.enabled to be true")
    (dict "enabled" .Values.homeAssistant.initContainer.tasks.setupSecretsYaml.enabled "msg" "homeAssistant.initContainer.tasks.setupSecretsYaml requires persistence.enabled to be true")
    (dict "enabled" .Values.homeAssistant.configuration.enabled "msg" "homeAssistant.configuration.enabled requires persistence.enabled; the init container copies configuration.yaml into the PVC at /config/configuration.yaml")
    (dict "enabled" .Values.homeAssistant.gitops.enabled "msg" "homeAssistant.gitops.enabled requires persistence.enabled to be true")
}}
{{- range $needsPersistence }}
{{- if and .enabled (not $.Values.persistence.enabled) }}
{{- fail .msg }}
{{- end }}
{{- end }}

# init-container tasks
{{- if and .Values.homeAssistant.initContainer.tasks.setupHACS.enabled (not .Values.homeAssistant.initContainer.tasks.setupHACS.version) }}
{{- fail "homeAssistant.initContainer.tasks.setupHACS.version must be set when setupHACS is enabled" }}
{{- end }}
{{- if and .Values.homeAssistant.initContainer.tasks.setupSecretsYaml.enabled (not .Values.homeAssistant.initContainer.tasks.setupSecretsYaml.secretName) }}
{{- fail "homeAssistant.initContainer.tasks.setupSecretsYaml.secretName must be set when setupSecretsYaml is enabled" }}
{{- end }}

# configuration
{{- if and .Values.homeAssistant.configuration.enabled (not .Values.homeAssistant.configuration.config) }}
{{- fail "homeAssistant.configuration.config must be set when homeAssistant.configuration.enabled is true" }}
{{- end }}
{{- if and .Values.homeAssistant.configuration.checkConfig.enabled (not .Values.homeAssistant.configuration.enabled) }}
{{- fail "homeAssistant.configuration.checkConfig.enabled requires homeAssistant.configuration.enabled to be true" }}
{{- end }}

# gitops
{{- if .Values.homeAssistant.gitops.enabled }}
{{- if not .Values.homeAssistant.gitops.knownHosts }}
{{- fail "homeAssistant.gitops.knownHosts must be set when gitops is enabled" }}
{{- end }}
{{- end }}

# secretVolumeMounts
{{- $seen := dict }}
{{- range .Values.secretVolumeMounts }}
{{- $volName := .name | default .secretName }}
{{- if index $seen $volName }}
{{- fail (printf "secretVolumeMounts: duplicate volume name %q; set a unique .name on one of the entries to disambiguate" $volName) }}
{{- end }}
{{- $_ := set $seen $volName true }}
{{- end }}

# setupSecretsYaml / secretVolumeMounts cross-check
{{- if .Values.homeAssistant.initContainer.tasks.setupSecretsYaml.enabled }}
{{- range .Values.secretVolumeMounts }}
{{- if eq .secretName $.Values.homeAssistant.initContainer.tasks.setupSecretsYaml.secretName }}
{{- fail (printf "secretVolumeMounts: secret %q is already used by homeAssistant.initContainer.tasks.setupSecretsYaml to generate /config/secrets.yaml; remove it from secretVolumeMounts" $.Values.homeAssistant.initContainer.tasks.setupSecretsYaml.secretName) }}
{{- end }}
{{- end }}
{{- end }}

# user initContainers reserved name check
{{- $reservedInitNames := list "gitops-setup" "bootstrap" "install-hacs" "generate-secrets-yaml" "copy-configuration" "check-config" }}
{{- range .Values.initContainers }}
{{- if has .name $reservedInitNames }}
{{- fail (printf "initContainers: name %q is reserved by the chart; rename your init container" .name) }}
{{- end }}
{{- end }}
