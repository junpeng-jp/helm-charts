{{- $httpPort := index .Values.networking.service.app.ports "http" }}
{{- if and .Values.networking.service.app.enabled $httpPort }}
{{- $port := $httpPort.port -}}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "home-assistant.fullname" . }}-test-connection
  labels:
    {{- include "home-assistant.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: {{ include "home-assistant.testImage" . }}
      imagePullPolicy: {{ .Values.global.testImage.pullPolicy }}
      command:
        - wget
        - --spider
        - -q
        - http://{{ include "home-assistant.fullname" . }}:{{ $port }}/
{{- end }}
