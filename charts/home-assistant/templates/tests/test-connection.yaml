{{- if .Values.networking.service.app.enabled }}
{{- $port := (index .Values.networking.service.app.ports "http").port -}}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "home-assistant.fullname" . }}-test-connection
  labels:
    {{- include "home-assistant.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: busybox
      command:
        - wget
        - --spider
        - -q
        - http://{{ include "home-assistant.fullname" . }}:{{ $port }}/
{{- end }}
