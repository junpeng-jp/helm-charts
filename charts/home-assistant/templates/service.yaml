apiVersion: v1
kind: Service
metadata:
  name: {{ include "home-assistant.fullname" . }}
  labels:
    {{- include "home-assistant.labels" . | nindent 4 }}
spec:
  type: {{ .Values.networking.service.type }}
  selector:
    {{- include "home-assistant.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.networking.service.port }}
      targetPort: http
      protocol: TCP
