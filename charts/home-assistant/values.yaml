global:
  image:
    registry: ghcr.io
    repository: home-assistant/home-assistant
    tag: "2026.5"       # highly encouraged to pin to a specific version of home-assistant
    digest: ""          # takes precedence over tag when set (e.g. sha256:abc123)
    pullPolicy: IfNotPresent
    pullSecrets: []
    # Create with: kubectl create secret docker-registry <name> \
    #   --docker-server=<registry> --docker-username=<user> --docker-password=<token>

nameOverride: ""
fullnameOverride: ""

replicaCount: 1

serviceAccount:
  create: false
  name: ""
  annotations: {}

initContainers: []

env:
  - name: TZ
    value: UTC

extraVolumes: []
extraVolumeMounts: []

startupProbe:
  enabled: false
  httpGet:
    path: /
    port: http
  periodSeconds: 10
  failureThreshold: 18
livenessProbe:
  enabled: true
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 5
readinessProbe:
  enabled: true
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 10

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 1Gi

pod:
  annotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # hostNetwork: true gives the pod access to the host's network interfaces.
  # Enable only if you want to have auto-discovery of wifi devices via mDNS
  hostNetwork: false

networking:
  service:
    app:
      enabled: true
      type: ClusterIP
      ports:
        http:
          enabled: true
          port: 8123
          protocol: TCP

ingress:
  gateway:
    enabled: false
    parentRefs:
      - name: my-gateway
        namespace: default
    hostnames:
      - ha.example.com

  traefik:
    enabled: false
    entryPoints:
      - websecure
    hostnames:
      - ha.example.com
    middlewares: []
    tls:
      enabled: false
      secretName: ""
      certResolver: ""

  # future: support for additionalIngresses (e.g. plain HTTP ingress on a
  # local IoT VLAN alongside the primary HTTPS ingress)

persistence:
  enabled: true
  storageClass: ""  # defaults to local-path
  accessModes:
    - ReadWriteOnce
  size: 5Gi
  annotations: {}
  labels: {}
  existingClaim: ""   # use an existing PVC directly (skips volumeClaimTemplate)
  existingVolume: ""  # bind the volumeClaimTemplate to a specific PV by name; mutually exclusive with existingClaim

monitor:
  metric:
    enabled: false
    path: /api/prometheus
    port: http
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
    # future: bearerTokenSecret
    # Reference a Kubernetes Secret containing a long-lived HA token

# Home Assistant application configuration.
homeAssistant:
  # initContainer - configuration for the utility init containers that run before Home Assistant.
  initContainer:
    # image - default image used by all utility init containers (fixPermissions, createSecretsYAML).
    # Override here to change the busybox image for all of them at once.
    image:
      registry: docker.io
      repository: busybox
      tag: "1.37"
      digest: ""          # takes precedence over tag when set (e.g. sha256:abc123)
      pullPolicy: IfNotPresent

    tasks:
      # createSecretsYAML - generates /config/secrets.yaml from a Kubernetes Secret.
      # Every key in that Secret becomes an entry in /config/secrets.yaml.
      createSecretsYAML: ""

      # setupHACS - installs HACS (Home Assistant Community Store) via an init container
      # before Home Assistant starts. The init container writes into /config/custom_components/hacs.
      # persistence must be enabled (or existingClaim set) for the config volume to exist.
      setupHACS: false

  # config - mounted to /config/configuration.yaml (read-only).
  # See: https://www.home-assistant.io/docs/configuration/
  #
  # Example ConfigMap (single key "configuration.yaml"):
  #
  #   apiVersion: v1
  #   kind: ConfigMap
  #   metadata:
  #     name: my-home-assistant-config
  #   data:
  #     configuration.yaml: |
  #       homeassistant:
  #         name: Home
  #         latitude: 37.7749
  #         longitude: -122.4194
  #         unit_system: metric
  #         time_zone: America/Los_Angeles
  #       http:
  #         use_x_forwarded_for: true
  #         trusted_proxies:
  #           - 10.0.0.0/8
  config:
    enabled: false
    existingConfigMap: ""
    checkConfig:
      enabled: false

  # packages - each file is mounted into /config/packages/ (read-only).
  # Packages can include: automation, script, sensor, binary_sensor,
  # input_boolean, input_number, input_select, input_text, group, etc.
  # See: https://www.home-assistant.io/docs/configuration/packages/
  #
  # Example ConfigMap (each key becomes a file under /config/packages/):
  #
  #   apiVersion: v1
  #   kind: ConfigMap
  #   metadata:
  #     name: my-home-assistant-packages
  #   data:
  #     lights.yaml: |
  #       automation:
  #         - alias: Turn on lights at sunset
  #           trigger:
  #             platform: sun
  #             event: sunset
  #           action:
  #             service: light.turn_on
  #             target:
  #               area_id: living_room
  #     climate.yaml: |
  #       input_number:
  #         target_temp:
  #           name: Target Temperature
  #           min: 15
  #           max: 30
  #           step: 0.5
  packages:
    enabled: false
    existingConfigMap: ""

  # themes - each file is mounted into /config/themes/ (read-only).
  # See: https://www.home-assistant.io/integrations/frontend/#defining-themes
  #
  # Example ConfigMap (each key becomes a file under /config/themes/):
  #
  #   apiVersion: v1
  #   kind: ConfigMap
  #   metadata:
  #     name: my-home-assistant-themes
  #   data:
  #     dark_mode.yaml: |
  #       dark_mode:
  #         primary-color: "#03a9f4"
  #         accent-color: "#ff9800"
  #         primary-background-color: "#111111"
  #         card-background-color: "#1c1c1c"
  #         primary-text-color: "#e1e1e1"
  themes:
    enabled: false
    existingConfigMap: ""
