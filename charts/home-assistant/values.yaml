global:
  # Pin the image tag to prevent redeployments from accidentally changing the Home Assistant version.
  # To pull from a private registry, create an image pull secret:
  #   kubectl create secret docker-registry <name> \
  #     --docker-server=<registry> --docker-username=<user> --docker-password=<token>
  image:
    registry: ghcr.io
    repository: home-assistant/home-assistant
    tag: "2026.5"
    digest: ""
    pullPolicy: IfNotPresent
    pullSecrets: []

nameOverride: ""
fullnameOverride: ""
# TODO: rethink where replicaCount config sits
replicaCount: 1

serviceAccount:
  create: false
  name: ""
  annotations: {}

initContainers: []

env:
  - name: TZ
    value: UTC

# secretVolumeMounts mounts Kubernetes Secrets into the main container under /run/secrets/.
# For Home Assistant's secrets.yaml, see homeAssistant.initContainer.tasks.setupSecretsYaml below.
#
# Example:
#   secretVolumeMounts:
#     - secretName: my-secret             # mounts at /run/secrets/my-secret
#     - secretName: my-secret
#       mountPath: alt-path               # mounts at /run/secrets/alt-path
secretVolumeMounts: []
extraVolumes: []
extraVolumeMounts: []

startupProbe:
  enabled: true
  # Enable for instances with many integrations or slow hardware - prevents liveness
  # probe restart loops during long cold starts. Allows up to 3 min: 18 × 10s.
  httpGet:
    path: /
    port: http
  periodSeconds: 10
  failureThreshold: 18
livenessProbe:
  enabled: true
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 60
  periodSeconds: 30
  failureThreshold: 5
readinessProbe:
  enabled: true
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 10

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 1Gi

pod:
  annotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  hostNetwork: false    # Enable only if you want to have auto-discovery of wifi devices via mDNS

networking:
  service:
    app:
      enabled: true
      type: ClusterIP
      ports:
        http:
          enabled: true
          port: 8123
          protocol: TCP

ingress:
  gateway:
    enabled: false
    parentRefs:
      - name: my-gateway
        namespace: default
    hostnames:
      - ha.example.com

  traefik:
    enabled: false
    entryPoints:
      - websecure
    hostnames:
      - ha.example.com
    middlewares: []
    tls:
      enabled: false
      secretName: ""
      certResolver: ""

  # future: support for additionalIngresses (e.g. plain HTTP ingress on a
  # local IoT VLAN alongside the primary HTTPS ingress)

persistence:
  enabled: true
  storageClass: ""  # uses the cluster default
  accessModes:
    - ReadWriteOnce
  size: 5Gi
  annotations: {}
  labels: {}
  existingClaim: ""   # use an existing PVC directly (skips volumeClaimTemplate)
  existingVolume: ""  # bind the volumeClaimTemplate to a specific PV by name; mutually exclusive with existingClaim

monitor:
  metric:
    enabled: false
    path: /api/prometheus
    port: http
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
    # future: bearerTokenSecret
    # Reference a Kubernetes Secret containing a long-lived HA token

# Home Assistant application configuration.
homeAssistant:
  # initContainer - configuration for the utility init containers that run before Home Assistant.
  initContainer:
    # image - default image used by all utility init containers.
    # Override here to change the image for all of them at once.
    image:
      registry: docker.io
      repository: alpine
      tag: "3.21"
      digest: ""          # takes precedence over tag when set (e.g. sha256:abc123)
      pullPolicy: IfNotPresent

    tasks:
      # setupHACS - installs HACS (Home Assistant Community Store) via an init container
      # before Home Assistant starts. The init container writes into /config/custom_components/hacs.
      # Requires persistence.enabled (or existingClaim set) for the config volume to exist.
      setupHACS:
        enabled: false
        version: "2.0.5"   # required when enabled

      # setupSecretsYaml - mounts a Kubernetes Secret as a volume and writes its
      # key-value pairs to /config/secrets.yaml before Home Assistant starts.
      #
      # This task fully manages /config/secrets.yaml and overwrites it on every pod restart. Don't
      # use the Studio Code Server, SSH, or Samba add-ons to modify secrets.yaml when this task is
      # enabled. Those changes are lost on the next restart.
      setupSecretsYaml:
        enabled: false
        secretName: ""  # required when enabled is true

  # config - seeds /config/configuration.yaml on every pod restart.
  # See: https://www.home-assistant.io/docs/configuration/
  #
  # Requires persistence.enabled. The init container overwrites this file on every restart,
  # so changes made via the file editor or VS Code add-on are lost on the next restart.
  #
  # To enable packages and themes, your configuration.yaml must include the directives below.
  # You can add them to the ConfigMap data alongside your other settings:
  #
  #   packages: !include_dir_merge_named packages/
  #   frontend:
  #     themes: !include_dir_merge_named themes/
  #
  # Example ConfigMap:
  #
  #   apiVersion: v1
  #   kind: ConfigMap
  #   metadata:
  #     name: my-home-assistant-config
  #   data:
  #     configuration.yaml: |
  #       homeassistant:
  #         name: Home
  #         latitude: 37.7749
  #         longitude: -122.4194
  #         unit_system: metric
  #         time_zone: America/Los_Angeles
  #       http:
  #         use_x_forwarded_for: true
  #         trusted_proxies:
  #           - 10.0.0.0/8
  config:
    enabled: false
    existingConfigMap: ""  # required when enabled is true; must contain key "configuration.yaml"
    checkConfig:
      enabled: false  # runs 'hass --script check_config' in an init container before startup; requires config.enabled and persistence.enabled

  # packages - seeds each file into /config/packages/ on every pod restart.
  # See: https://www.home-assistant.io/docs/configuration/packages/
  #
  # Requires persistence.enabled and the packages include directive in configuration.yaml (see config above).
  # The init container overwrites these files on every restart.
  #
  # Example ConfigMap (each key becomes a file under /config/packages/):
  #
  #   apiVersion: v1
  #   kind: ConfigMap
  #   metadata:
  #     name: my-home-assistant-packages
  #   data:
  #     lights.yaml: |
  #       automation:
  #         - alias: Turn on lights at sunset
  #           trigger:
  #             platform: sun
  #             event: sunset
  #           action:
  #             service: light.turn_on
  #             target:
  #               area_id: living_room
  packages:
    enabled: false
    existingConfigMap: ""

  # themes - seeds each file into /config/themes/ on every pod restart.
  # See: https://www.home-assistant.io/integrations/frontend/#defining-themes
  #
  # Requires persistence.enabled and the frontend.themes include directive in configuration.yaml (see config above).
  # The init container overwrites these files on every restart.
  #
  # Example ConfigMap (each key becomes a file under /config/themes/):
  #
  #   apiVersion: v1
  #   kind: ConfigMap
  #   metadata:
  #     name: my-home-assistant-themes
  #   data:
  #     dark_mode.yaml: |
  #       dark_mode:
  #         primary-color: "#03a9f4"
  #         accent-color: "#ff9800"
  #         primary-background-color: "#111111"
  #         card-background-color: "#1c1c1c"
  #         primary-text-color: "#e1e1e1"
  themes:
    enabled: false
    existingConfigMap: ""
