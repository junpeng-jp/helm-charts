global:
  # Pin the image tag to prevent redeployments from accidentally changing the Home Assistant version.
  # To pull from a private registry, create an image pull secret:
  #   kubectl create secret docker-registry <name> \
  #     --docker-server=<registry> --docker-username=<user> --docker-password=<token>
  image:
    registry: ghcr.io
    repository: home-assistant/home-assistant
    tag: "2026.5"
    digest: ""
    pullPolicy: IfNotPresent
    pullSecrets: []
  testImage:
    registry: docker.io
    repository: busybox
    tag: "1.37"
    digest: ""
    pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""
replicaCount: 1
podManagementPolicy: OrderedReady
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    partition: 0

serviceAccount:
  create: false
  name: ""
  annotations: {}

# Extra init containers injected after the chart-managed init containers (gitops-setup, bootstrap)
# and before Home Assistant starts. Use this for tasks that depend on bootstrap having already run
# (e.g. secrets.yaml written, HACS installed, configuration.yaml in place).
# Names "gitops-setup", "bootstrap", and "check-config" are reserved by the chart.
initContainers: []

env:
  - name: TZ
    value: UTC

# secretVolumeMounts mounts Kubernetes Secrets into the main container under /run/secrets/.
# For Home Assistant's secrets.yaml, see homeAssistant.initContainer.tasks.setupSecretsYaml below.
#
# Fields:
#   secretName: (required) name of the Kubernetes Secret to mount.
#   mountPath:  subdirectory under /run/secrets/ where the secret is mounted.
#               Defaults to secretName.
#   name:       K8s volume name (must be unique across all entries).
#               Required when the same secretName appears more than once — use it to
#               disambiguate the volume while mountPath controls where each copy lands.
#               Defaults to secretName.
#
# Example:
#   secretVolumeMounts:
#     - secretName: my-secret                  # → /run/secrets/my-secret
#     - secretName: my-secret
#       mountPath: my-secret-alt               # → /run/secrets/my-secret-alt
#       name: my-secret-alt                    # required: unique volume name for the second entry
secretVolumeMounts: []
extraVolumes: []
extraVolumeMounts: []

startupProbe:
  enabled: false
  # Enable for instances with many integrations or slow hardware - prevents liveness
  # probe restart loops during long cold starts. Allows up to 3 min: 18 × 10s.
  httpGet:
    path: /
    port: http
  periodSeconds: 10
  failureThreshold: 18
livenessProbe:
  enabled: true
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 60
  periodSeconds: 30
  failureThreshold: 5
readinessProbe:
  enabled: true
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 10  # HA is slow to report ready; 10 × 10s = 100s total grace period

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 1Gi
    # cpu limit intentionally omitted - Home Assistant automations can cause brief CPU spikes

# podSecurityContext and containerSecurityContext are intentionally omitted.
# home-assistant uses s6-overlay as its init system, which must start as root and write to /run.
# Setting runAsNonRoot or readOnlyRootFilesystem on the main container causes an immediate crash.

pod:
  annotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  hostNetwork: false    # Enable only if you want to have auto-discovery of wifi devices via mDNS

networking:
  headlessService:
    publishNotReadyAddresses: true
  service:
    app:
      enabled: true
      type: ClusterIP
      ports:
        http:
          port: 8123
          protocol: TCP

ingress:
  gateway:
    enabled: false
    parentRefs:
      - name: my-gateway
        namespace: default
    hostnames:
      - ha.example.com

  traefik:
    enabled: false
    entryPoints:
      - websecure
    hostnames:
      - ha.example.com
    middlewares: []
    tls:
      enabled: false
      secretName: ""
      certResolver: ""

  # future: support for additionalIngresses (e.g. plain HTTP ingress on a
  # local IoT VLAN alongside the primary HTTPS ingress)

persistence:
  enabled: true
  storageClass: ""  # uses the cluster default
  accessModes:
    - ReadWriteOnce
  size: 5Gi
  annotations: {}
  labels: {}
  existingClaim: ""   # use an existing PVC directly (skips volumeClaimTemplate)
  existingVolume: ""  # bind the volumeClaimTemplate to a specific PV by name; mutually exclusive with existingClaim

monitor:
  metric:
    enabled: false
    path: /api/prometheus
    port: http
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
    # future: bearerTokenSecret
    # Reference a Kubernetes Secret containing a long-lived HA token

# Home Assistant application configuration.
homeAssistant:
  # initContainer - configuration for the utility init containers that run before Home Assistant.
  # Override here to change the image for all of them at once.
  initContainer:
    image:
      registry: docker.io
      repository: alpine
      tag: "3.21"
      digest: ""          # takes precedence over tag when set (e.g. sha256:abc123)
      pullPolicy: IfNotPresent

    resources:
      requests:
        memory: 64Mi
        cpu: 50m

    tasks:
      # setupHACS - installs HACS (Home Assistant Community Store) via an init container
      # before Home Assistant starts. The init container writes into /config/custom_components/hacs.
      # Requires persistence.enabled (or existingClaim set) for the config volume to exist.
      setupHACS:
        enabled: false
        version: "2.0.5"   # required when enabled
        sha256: ""          # optional; if set, verifies the downloaded zip before installing

      # setupSecretsYaml - mounts a Kubernetes Secret as a volume and writes its
      # key-value pairs to /config/secrets.yaml before Home Assistant starts.
      #
      # This task fully manages /config/secrets.yaml and overwrites it on every pod restart. Don't
      # use the Studio Code Server, SSH, or Samba add-ons to modify secrets.yaml when this task is
      # enabled. Those changes are lost on the next restart.
      setupSecretsYaml:
        enabled: false
        secretName: ""  # required when enabled is true

  # configuration - bootstraps /config/configuration.yaml on first run only (write-if-not-exists).
  # See: https://www.home-assistant.io/docs/configuration/
  #
  # Requires persistence.enabled. The init container writes /config/configuration.yaml only if the
  # file does not yet exist on the PVC - subsequent pod restarts leave the file untouched, so changes
  # made via the file editor or VS Code add-on are preserved.
  #
  # The chart renders a ConfigMap (<release>-home-assistant-configuration) from the inline config
  # map below. Specify your configuration.yaml content as a nested YAML structure under config.
  #
  # Example:
  #
  #   homeAssistant:
  #     configuration:
  #       enabled: true
  #       config:
  #         homeassistant:
  #           name: Home
  #           latitude: 37.7749
  #           longitude: -122.4194
  #           unit_system: metric
  #           time_zone: America/Los_Angeles
  #         http:
  #           use_x_forwarded_for: true
  #           trusted_proxies:
  #             - 10.0.0.0/8
  configuration:
    enabled: false
    config: {}  # nested key-value map; serialised to YAML as /config/configuration.yaml content
    checkConfig:
      enabled: false  # runs 'hass --script check_config' in an init container before startup; requires configuration.enabled and persistence.enabled
      resources:
        requests:
          memory: 256Mi
          cpu: 100m

  # gitops - mounts a sync script into the Home Assistant container for git-managed configuration.
  #
  # The bundled sync.sh fetches a git ref, validates it with 'hass --script check_config',
  # and copies specified paths to their destinations. Trigger it from a Home Assistant
  # shell_command automation, passing --repo, --ref, and --copy arguments.
  #
  # Requires persistence.enabled.
  gitops:
    enabled: false

    # Git repositories to register. An init container writes the remote URL for each repo to
    # /config/gitops/<name>/remote on the PVC before Home Assistant starts. Required when enabled.
    repos: []
    # - name: ha-config
    #   url: git@github.com:your-org/ha-config.git

    # Name of a Kubernetes Secret containing the SSH deploy key. Required when enabled.
    # Create the secret with the key name matching sshKeyName below:
    #   kubectl create secret generic ha-gitops-ssh \
    #     --from-file=id_ed25519=./ssh/id_ed25519
    # The chart mounts the key at /run/secrets/gitops/ssh_key (mode 0400).
    sshKeySecret: ""

    # Key name inside the sshKeySecret to use as the deploy key.
    # Change this if your Secret uses a different key name (e.g. id_rsa, id_ecdsa).
    sshKeyName: id_ed25519

    # SSH known_hosts content for verifying the git host's identity. Required when enabled.
    knownHosts: ""

    # SSH allowed_signers content for commit/tag signature verification.
    # When set, every sync verifies the fetched commit or annotated tag against these signers.
    allowedSigners: ""

    # Maximum size of the in-memory tmpfs used as the git worktree checkout directory.
    # Increase if your config repo is large.
    checkDirSizeLimit: 256Mi
