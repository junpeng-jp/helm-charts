suite: Secret Volume Mounts
templates:
  - templates/statefulset.yaml
tests:
  - it: mounts a secret at the default path and uses secretName as the volume name
    set:
      secretVolumeMounts:
        - secretName: my-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: my-secret
            mountPath: /run/secrets/my-secret
            readOnly: true
      - contains:
          path: spec.template.spec.volumes
          content:
            name: my-secret
            secret:
              secretName: my-secret

  # The name field overrides the volume identifier while secretName still points to the K8s Secret.
  - it: uses the name field as volume name while secretName still references the Kubernetes Secret
    set:
      secretVolumeMounts:
        - secretName: my-secret
          name: my-secret-alias
          mountPath: custom-path
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: my-secret-alias
            mountPath: /run/secrets/custom-path
            readOnly: true
      - contains:
          path: spec.template.spec.volumes
          content:
            name: my-secret-alias
            secret:
              secretName: my-secret

  - it: mounts a secret at a custom sub-path under /run/secrets when mountPath is set without a name override
    set:
      secretVolumeMounts:
        - secretName: my-secret
          mountPath: custom-path
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: my-secret
            mountPath: /run/secrets/custom-path
            readOnly: true
