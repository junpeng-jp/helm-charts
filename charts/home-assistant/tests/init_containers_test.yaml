suite: Init Containers
templates:
  - templates/statefulset.yaml
tests:
  - it: renders init containers in correct order with gitops, all tasks, and user containers enabled
    set:
      homeAssistant.gitops.enabled: true
      homeAssistant.gitops.knownHosts: "github.com ssh-ed25519 AAAA..."
      homeAssistant.initContainer.tasks.setupHACS.enabled: true
      homeAssistant.initContainer.tasks.setupHACS.version: "2.0.1"
      homeAssistant.initContainer.tasks.setupSecretsYaml.enabled: true
      homeAssistant.initContainer.tasks.setupSecretsYaml.secretName: ha-secrets
      homeAssistant.configuration.enabled: true
      homeAssistant.configuration.config:
        homeassistant:
          name: Home
      homeAssistant.configuration.checkConfig.enabled: true
    values:
      - fixtures/init-containers.yaml
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: gitops-setup
      - equal:
          path: spec.template.spec.initContainers[1].name
          value: wait-for-mqtt
      - equal:
          path: spec.template.spec.initContainers[2].name
          value: bootstrap
      - equal:
          path: spec.template.spec.initContainers[2].image
          value: docker.io/alpine:3.21
      - equal:
          path: spec.template.spec.initContainers[3].name
          value: check-config
      - equal:
          path: spec.template.spec.initContainers[3].image
          value: ghcr.io/home-assistant/home-assistant:2026.5
      - equal:
          path: spec.template.spec.initContainers[3].command[0]
          value: hass

  - it: gitops-setup runs as root with DROP ALL and no CHOWN capability
    set:
      homeAssistant.gitops.enabled: true
      homeAssistant.gitops.knownHosts: "github.com ssh-ed25519 AAAA..."
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: gitops-setup
      - equal:
          path: spec.template.spec.initContainers[0].securityContext.runAsUser
          value: 0
      - equal:
          path: spec.template.spec.initContainers[0].securityContext.runAsNonRoot
          value: false
      - equal:
          path: spec.template.spec.initContainers[0].securityContext.readOnlyRootFilesystem
          value: true
      - equal:
          path: spec.template.spec.initContainers[0].securityContext.allowPrivilegeEscalation
          value: false
      - contains:
          path: spec.template.spec.initContainers[0].securityContext.capabilities.drop
          content: ALL
      - notExists:
          path: spec.template.spec.initContainers[0].securityContext.capabilities.add
      - equal:
          path: spec.template.spec.initContainers[0].volumeMounts
          value:
            - name: config
              mountPath: /config

  - it: bootstrap has least-privilege security context with writable root for apk
    set:
      homeAssistant.initContainer.tasks.setupHACS.enabled: true
      homeAssistant.initContainer.tasks.setupHACS.version: "2.0.1"
      homeAssistant.initContainer.tasks.setupSecretsYaml.enabled: true
      homeAssistant.initContainer.tasks.setupSecretsYaml.secretName: ha-secrets
      homeAssistant.configuration.enabled: true
      homeAssistant.configuration.config:
        homeassistant:
          name: Home
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: bootstrap
      - equal:
          path: spec.template.spec.initContainers[0].securityContext.runAsUser
          value: 0
      - equal:
          path: spec.template.spec.initContainers[0].securityContext.readOnlyRootFilesystem
          value: false
      - equal:
          path: spec.template.spec.initContainers[0].securityContext.allowPrivilegeEscalation
          value: false
      - contains:
          path: spec.template.spec.initContainers[0].securityContext.capabilities.drop
          content: ALL
      - contains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: HACS_ENABLED
            value: "true"
      - contains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: SECRETS_ENABLED
            value: "true"
      - contains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: CONFIG_ENABLED
            value: "true"

  - it: check-config mounts only the config PVC even when gitops is enabled
    set:
      homeAssistant.configuration.enabled: true
      homeAssistant.configuration.config:
        homeassistant:
          name: Home
      homeAssistant.configuration.checkConfig.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: bootstrap
      - equal:
          path: spec.template.spec.initContainers[1].name
          value: check-config
      - equal:
          path: spec.template.spec.initContainers[1].volumeMounts
          value:
            - name: config
              mountPath: /config
