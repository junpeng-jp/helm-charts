suite: Service
templates:
  - templates/service.yaml
tests:
  - it: renders a ClusterIP service targeting HA on port 8123
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-home-assistant
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.ports[0].port
          value: 8123
      - equal:
          path: spec.ports[0].name
          value: http
      - equal:
          path: spec.ports[0].targetPort
          value: http
      - equal:
          path: spec.selector["app.kubernetes.io/name"]
          value: home-assistant
      - equal:
          path: spec.selector["app.kubernetes.io/instance"]
          value: RELEASE-NAME
