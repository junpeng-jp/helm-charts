suite: ConfigMap
templates:
  - templates/configmap.yaml
tests:
  - it: does not render when homeAssistant.config and homeAssistant.packages are disabled
    set:
      homeAssistant.config.enabled: false
      homeAssistant.packages.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders config ConfigMap with correct name when enabled
    set:
      homeAssistant.config.enabled: true
    asserts:
      - isKind:
          of: ConfigMap
        documentIndex: 0
      - equal:
          path: metadata.name
          value: RELEASE-NAME-home-assistant-config
        documentIndex: 0

  - it: configuration.yaml contains homeassistant, default_config, http, and logger blocks
    set:
      homeAssistant.config.enabled: true
      homeAssistant.config.name: "My Home"
    asserts:
      - matchRegex:
          path: data["configuration.yaml"]
          pattern: "homeassistant:"
        documentIndex: 0
      - matchRegex:
          path: data["configuration.yaml"]
          pattern: 'name: "My Home"'
        documentIndex: 0
      - matchRegex:
          path: data["configuration.yaml"]
          pattern: "default_config:"
        documentIndex: 0
      - matchRegex:
          path: data["configuration.yaml"]
          pattern: "http:"
        documentIndex: 0
      - matchRegex:
          path: data["configuration.yaml"]
          pattern: "logger:"
        documentIndex: 0

  - it: includes trusted proxies in http block
    set:
      homeAssistant.config.enabled: true
      homeAssistant.config.http.trustedProxies:
        - 172.16.0.0/12
    asserts:
      - matchRegex:
          path: data["configuration.yaml"]
          pattern: "172.16.0.0/12"
        documentIndex: 0

  - it: does not include packages directive when homeAssistant.packages is disabled
    set:
      homeAssistant.config.enabled: true
      homeAssistant.packages.enabled: false
    asserts:
      - notMatchRegex:
          path: data["configuration.yaml"]
          pattern: "include_dir_named"
        documentIndex: 0

  - it: includes packages directive in config when homeAssistant.packages is enabled
    set:
      homeAssistant.config.enabled: true
      homeAssistant.packages.enabled: true
      homeAssistant.packages.files:
        network.yaml: |
          sensor:
            - platform: ping
    asserts:
      - matchRegex:
          path: data["configuration.yaml"]
          pattern: "include_dir_named packages"
        documentIndex: 0

  - it: renders packages ConfigMap with correct name when enabled
    set:
      homeAssistant.packages.enabled: true
    asserts:
      - isKind:
          of: ConfigMap
        documentIndex: 0
      - equal:
          path: metadata.name
          value: RELEASE-NAME-home-assistant-packages
        documentIndex: 0

  - it: renders package files in packages ConfigMap
    set:
      homeAssistant.packages.enabled: true
      homeAssistant.packages.files:
        network.yaml: |
          sensor:
            - platform: ping
    asserts:
      - isNotNull:
          path: data["network.yaml"]
        documentIndex: 0

  - it: renders both ConfigMaps when config and packages are enabled
    set:
      homeAssistant.config.enabled: true
      homeAssistant.packages.enabled: true
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.name
          value: RELEASE-NAME-home-assistant-config
        documentIndex: 0
      - equal:
          path: metadata.name
          value: RELEASE-NAME-home-assistant-packages
        documentIndex: 1

  - it: uses fullnameOverride in ConfigMap names
    set:
      homeAssistant.config.enabled: true
      homeAssistant.packages.enabled: true
      fullnameOverride: my-ha
    asserts:
      - equal:
          path: metadata.name
          value: my-ha-config
        documentIndex: 0
      - equal:
          path: metadata.name
          value: my-ha-packages
        documentIndex: 1
