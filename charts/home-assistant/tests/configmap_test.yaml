suite: ConfigMap
templates:
  - templates/configmap.yaml
tests:
  - it: renders all three chart-managed ConfigMaps when all enabled with no existingConfigMap
    set:
      homeAssistant.config.enabled: true
      homeAssistant.packages.enabled: true
      homeAssistant.themes.enabled: true
    asserts:
      - hasDocuments:
          count: 3
      - isKind:
          of: ConfigMap
        documentIndex: 0
      - equal:
          path: metadata.name
          value: RELEASE-NAME-home-assistant-config
        documentIndex: 0
      - isKind:
          of: ConfigMap
        documentIndex: 1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-home-assistant-packages
        documentIndex: 1
      - isKind:
          of: ConfigMap
        documentIndex: 2
      - equal:
          path: metadata.name
          value: RELEASE-NAME-home-assistant-themes
        documentIndex: 2

  - it: does not render when all three are disabled
    set:
      homeAssistant.config.enabled: false
      homeAssistant.packages.enabled: false
      homeAssistant.themes.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: does not render chart-managed ConfigMap when existingConfigMap is set
    set:
      homeAssistant.config.enabled: true
      homeAssistant.config.existingConfigMap: my-ha-config
      homeAssistant.packages.enabled: true
      homeAssistant.themes.enabled: true
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.name
          value: RELEASE-NAME-home-assistant-packages
        documentIndex: 0
      - equal:
          path: metadata.name
          value: RELEASE-NAME-home-assistant-themes
        documentIndex: 1

  - it: uses fullnameOverride in ConfigMap names
    set:
      homeAssistant.config.enabled: true
      homeAssistant.packages.enabled: true
      homeAssistant.themes.enabled: true
      fullnameOverride: my-ha
    asserts:
      - equal:
          path: metadata.name
          value: my-ha-config
        documentIndex: 0
      - equal:
          path: metadata.name
          value: my-ha-packages
        documentIndex: 1
      - equal:
          path: metadata.name
          value: my-ha-themes
        documentIndex: 2
