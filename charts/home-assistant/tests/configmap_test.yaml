suite: ConfigMap
templates:
  - templates/configmap.yaml
tests:
  - it: does not render when homeAssistant.config and homeAssistant.packages are disabled
    set:
      homeAssistant.config.enabled: false
      homeAssistant.packages.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders config ConfigMap with correct name when enabled
    set:
      homeAssistant.config.enabled: true
    asserts:
      - isKind:
          of: ConfigMap
        documentIndex: 0
      - equal:
          path: metadata.name
          value: RELEASE-NAME-home-assistant-config
        documentIndex: 0

  - it: configuration.yaml contains the verbatim content from homeAssistant.config.content
    set:
      homeAssistant.config.enabled: true
      homeAssistant.config.content: |
        homeassistant:
          name: My Home
        default_config:
        recorder:
          db_url: !secret db_url
    asserts:
      - matchRegex:
          path: data["configuration.yaml"]
          pattern: "name: My Home"
        documentIndex: 0
      - matchRegex:
          path: data["configuration.yaml"]
          pattern: "recorder:"
        documentIndex: 0
      - matchRegex:
          path: data["configuration.yaml"]
          pattern: "db_url: !secret db_url"
        documentIndex: 0

  - it: renders packages ConfigMap with correct name when enabled
    set:
      homeAssistant.packages.enabled: true
    asserts:
      - isKind:
          of: ConfigMap
        documentIndex: 0
      - equal:
          path: metadata.name
          value: RELEASE-NAME-home-assistant-packages
        documentIndex: 0

  - it: renders package files in packages ConfigMap
    set:
      homeAssistant.packages.enabled: true
      homeAssistant.packages.files:
        network.yaml: |
          sensor:
            - platform: ping
    asserts:
      - isNotNull:
          path: data["network.yaml"]
        documentIndex: 0

  - it: renders both ConfigMaps when config and packages are enabled
    set:
      homeAssistant.config.enabled: true
      homeAssistant.packages.enabled: true
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.name
          value: RELEASE-NAME-home-assistant-config
        documentIndex: 0
      - equal:
          path: metadata.name
          value: RELEASE-NAME-home-assistant-packages
        documentIndex: 1

  - it: uses fullnameOverride in ConfigMap names
    set:
      homeAssistant.config.enabled: true
      homeAssistant.packages.enabled: true
      fullnameOverride: my-ha
    asserts:
      - equal:
          path: metadata.name
          value: my-ha-config
        documentIndex: 0
      - equal:
          path: metadata.name
          value: my-ha-packages
        documentIndex: 1
