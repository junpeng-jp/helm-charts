suite: StatefulSet
templates:
  - templates/statefulset.yaml
tests:
  - it: renders a StatefulSet with realistic defaults
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/home-assistant/home-assistant:2026.5
      - equal:
          path: spec.template.spec.hostNetwork
          value: false
      - notExists:
          path: spec.template.spec.dnsPolicy
      - equal:
          path: spec.volumeClaimTemplates[0].metadata.name
          value: config
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /

  - it: sets ClusterFirstWithHostNet dnsPolicy when hostNetwork is enabled
    set:
      pod.hostNetwork: true
    asserts:
      - equal:
          path: spec.template.spec.hostNetwork
          value: true
      - equal:
          path: spec.template.spec.dnsPolicy
          value: ClusterFirstWithHostNet

  - it: uses digest over tag when both are set
    set:
      global.image.tag: "2025.1.0"
      global.image.digest: "sha256:abc123"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/home-assistant/home-assistant@sha256:abc123

  - it: mounts existing PVC as volume instead of creating a VolumeClaimTemplate
    set:
      persistence.existingClaim: my-existing-pvc
    asserts:
      - notExists:
          path: spec.volumeClaimTemplates
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config
            persistentVolumeClaim:
              claimName: my-existing-pvc

  - it: sets storageClassName in VolumeClaimTemplate when specified
    set:
      persistence.storageClass: local-path
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].spec.storageClassName
          value: local-path

  - it: sets volumeName in VolumeClaimTemplate when existingVolume is set
    set:
      persistence.existingVolume: my-existing-pv
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].spec.volumeName
          value: my-existing-pv
      - notExists:
          path: spec.template.spec.volumes

  - it: fails when both existingClaim and existingVolume are set
    set:
      persistence.existingClaim: my-pvc
      persistence.existingVolume: my-pv
    asserts:
      - failedTemplate:
          errorMessage: "persistence.existingClaim and persistence.existingVolume are mutually exclusive; set at most one"

  - it: renders startupProbe when enabled
    set:
      startupProbe.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.path
          value: /
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.port
          value: http

  - it: does not render startupProbe when disabled
    set:
      startupProbe.enabled: false
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].startupProbe

  - it: renders user-defined initContainers
    values:
      - fixtures/init-containers.yaml
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: wait-for-mqtt

  - it: does not render HACS init container when setupHACS is disabled
    asserts:
      - notExists:
          path: spec.template.spec.initContainers

  - it: renders HACS init container when setupHACS is enabled
    set:
      homeAssistant.initContainer.tasks.setupHACS: true
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: install-hacs
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: docker.io/alpine:3.21
      - equal:
          path: spec.template.spec.initContainers[0].imagePullPolicy
          value: IfNotPresent
      - contains:
          path: spec.template.spec.initContainers[0].volumeMounts
          content:
            name: config
            mountPath: /config

  - it: HACS init container appears after user-defined initContainers
    set:
      homeAssistant.initContainer.tasks.setupHACS: true
    values:
      - fixtures/init-containers.yaml
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: wait-for-mqtt
      - equal:
          path: spec.template.spec.initContainers[1].name
          value: install-hacs

  - it: uses fullnameOverride as complete resource name

    set:
      fullnameOverride: my-ha
    asserts:
      - equal:
          path: metadata.name
          value: my-ha

  - it: renders generate-secrets-yaml init container when createSecretsYAML is non-empty
    set:
      homeAssistant.initContainer.tasks.createSecretsYAML: ha-secrets
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: generate-secrets-yaml
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: docker.io/busybox:1.37
      - equal:
          path: spec.template.spec.initContainers[0].imagePullPolicy
          value: IfNotPresent
      - contains:
          path: spec.template.spec.initContainers[0].volumeMounts
          content:
            name: config
            mountPath: /config

  - it: generate-secrets-yaml uses digest over tag when both are set
    set:
      homeAssistant.initContainer.image.tag: "1.37"
      homeAssistant.initContainer.image.digest: "sha256:abc123"
      homeAssistant.initContainer.tasks.createSecretsYAML: ha-secrets
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: docker.io/busybox@sha256:abc123

  - it: generate-secrets-yaml mounts the configured secret
    set:
      homeAssistant.initContainer.tasks.createSecretsYAML: ha-secrets
    asserts:
      - contains:
          path: spec.template.spec.initContainers[0].volumeMounts
          content:
            name: ha-secrets
            mountPath: /run/secrets/ha-secrets
            readOnly: true
      - contains:
          path: spec.template.spec.volumes
          content:
            name: ha-secrets
            secret:
              secretName: ha-secrets

  - it: does not render generate-secrets-yaml init container when createSecretsYAML is empty
    set:
      homeAssistant.initContainer.tasks.createSecretsYAML: ""
    asserts:
      - notExists:
          path: spec.template.spec.initContainers

  - it: generate-secrets-yaml appears after install-hacs
    set:
      homeAssistant.initContainer.tasks.setupHACS: true
      homeAssistant.initContainer.tasks.createSecretsYAML: ha-secrets
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: install-hacs
      - equal:
          path: spec.template.spec.initContainers[1].name
          value: generate-secrets-yaml

  - it: renders check-config init container when config and checkConfig are enabled
    set:
      homeAssistant.config.enabled: true
      homeAssistant.config.checkConfig.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: check-config
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: ghcr.io/home-assistant/home-assistant:2026.5
      - contains:
          path: spec.template.spec.initContainers[0].volumeMounts
          content:
            name: config
            mountPath: /config
      - contains:
          path: spec.template.spec.initContainers[0].volumeMounts
          content:
            name: ha-config
            mountPath: /config/configuration.yaml
            subPath: configuration.yaml
            readOnly: true

  - it: does not render check-config init container when checkConfig is disabled
    set:
      homeAssistant.config.enabled: true
      homeAssistant.config.checkConfig.enabled: false
    asserts:
      - notExists:
          path: spec.template.spec.initContainers

  - it: check-config appears after generate-secrets-yaml when both are enabled
    set:
      homeAssistant.config.enabled: true
      homeAssistant.config.checkConfig.enabled: true
      homeAssistant.initContainer.tasks.createSecretsYAML: ha-secrets
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: generate-secrets-yaml
      - equal:
          path: spec.template.spec.initContainers[1].name
          value: check-config

  - it: does not render ha-config or ha-packages volumes when both are disabled
    set:
      homeAssistant.config.enabled: false
      homeAssistant.packages.enabled: false
    asserts:
      - notExists:
          path: spec.template.spec.volumes

  - it: mounts configuration.yaml via subPath when homeAssistant.config is enabled
    set:
      homeAssistant.config.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: ha-config
            configMap:
              name: RELEASE-NAME-home-assistant-config
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: ha-config
            mountPath: /config/configuration.yaml
            subPath: configuration.yaml
            readOnly: true

  - it: mounts packages directory when homeAssistant.packages is enabled
    set:
      homeAssistant.packages.enabled: true
      homeAssistant.packages.files:
        network.yaml: "sensor: []"
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: ha-packages
            configMap:
              name: RELEASE-NAME-home-assistant-packages
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: ha-packages
            mountPath: /config/packages
            readOnly: true

  - it: does not mount packages directory when homeAssistant.packages is disabled
    set:
      homeAssistant.config.enabled: true
      homeAssistant.packages.enabled: false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            mountPath: /config/packages

  - it: mounts config and packages independently
    set:
      homeAssistant.config.enabled: true
      homeAssistant.packages.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: ha-config
            configMap:
              name: RELEASE-NAME-home-assistant-config
      - contains:
          path: spec.template.spec.volumes
          content:
            name: ha-packages
            configMap:
              name: RELEASE-NAME-home-assistant-packages
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: ha-config
            mountPath: /config/configuration.yaml
            subPath: configuration.yaml
            readOnly: true
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: ha-packages
            mountPath: /config/packages
            readOnly: true
