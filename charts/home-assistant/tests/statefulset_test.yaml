suite: StatefulSet
templates:
  - templates/statefulset.yaml
tests:
  - it: renders a StatefulSet with realistic defaults
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/home-assistant/home-assistant:2026.5
      - equal:
          path: spec.template.spec.hostNetwork
          value: false
      - notExists:
          path: spec.template.spec.dnsPolicy
      - equal:
          path: spec.volumeClaimTemplates[0].metadata.name
          value: config
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /

  - it: sets ClusterFirstWithHostNet dnsPolicy when hostNetwork is enabled
    set:
      pod.hostNetwork: true
    asserts:
      - equal:
          path: spec.template.spec.hostNetwork
          value: true
      - equal:
          path: spec.template.spec.dnsPolicy
          value: ClusterFirstWithHostNet

  - it: uses digest over tag when both are set
    set:
      global.image.tag: "2025.1.0"
      global.image.digest: "sha256:abc123"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/home-assistant/home-assistant@sha256:abc123

  - it: mounts existing PVC as volume instead of creating a VolumeClaimTemplate
    set:
      persistence.existingClaim: my-existing-pvc
    asserts:
      - notExists:
          path: spec.volumeClaimTemplates
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config
            persistentVolumeClaim:
              claimName: my-existing-pvc

  - it: sets storageClassName in VolumeClaimTemplate when specified
    set:
      persistence.storageClass: local-path
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].spec.storageClassName
          value: local-path

  - it: adds USB device volumes and mounts for each entry in usbDevices
    set:
      homeAssistant.usbDevices:
        - hostPath: /dev/serial/by-id/usb-test-device-0
          mountPath: /dev/ttyUSB0
        - hostPath: /dev/serial/by-id/usb-test-device-1
          mountPath: /dev/ttyUSB1
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: usb-device-0
            hostPath:
              path: /dev/serial/by-id/usb-test-device-0
      - contains:
          path: spec.template.spec.volumes
          content:
            name: usb-device-1
            hostPath:
              path: /dev/serial/by-id/usb-test-device-1
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: usb-device-0
            mountPath: /dev/ttyUSB0
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: usb-device-1
            mountPath: /dev/ttyUSB1

  - it: renders initContainers from fixture
    values:
      - fixtures/init-containers.yaml
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: wait-for-mqtt

  - it: uses fullnameOverride as complete resource name
    set:
      fullnameOverride: my-ha
    asserts:
      - equal:
          path: metadata.name
          value: my-ha

  - it: does not render ha-config or ha-packages volumes when both are disabled
    set:
      homeAssistant.config.enabled: false
      homeAssistant.packages.enabled: false
    asserts:
      - notExists:
          path: spec.template.spec.volumes

  - it: mounts configuration.yaml via subPath when homeAssistant.config is enabled
    set:
      homeAssistant.config.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: ha-config
            configMap:
              name: RELEASE-NAME-home-assistant-config
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: ha-config
            mountPath: /config/configuration.yaml
            subPath: configuration.yaml
            readOnly: true

  - it: mounts packages directory when homeAssistant.packages is enabled
    set:
      homeAssistant.packages.enabled: true
      homeAssistant.packages.files:
        network.yaml: "sensor: []"
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: ha-packages
            configMap:
              name: RELEASE-NAME-home-assistant-packages
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: ha-packages
            mountPath: /config/packages
            readOnly: true

  - it: does not mount packages directory when homeAssistant.packages is disabled
    set:
      homeAssistant.config.enabled: true
      homeAssistant.packages.enabled: false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            mountPath: /config/packages

  - it: mounts config and packages independently
    set:
      homeAssistant.config.enabled: true
      homeAssistant.packages.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: ha-config
            configMap:
              name: RELEASE-NAME-home-assistant-config
      - contains:
          path: spec.template.spec.volumes
          content:
            name: ha-packages
            configMap:
              name: RELEASE-NAME-home-assistant-packages
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: ha-config
            mountPath: /config/configuration.yaml
            subPath: configuration.yaml
            readOnly: true
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: ha-packages
            mountPath: /config/packages
            readOnly: true
