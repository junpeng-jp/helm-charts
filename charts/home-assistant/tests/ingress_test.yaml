suite: Ingress
templates:
  - templates/httproute.yaml
  - templates/ingressroute.yaml
tests:
  - it: does not render an HTTPRoute when gateway is disabled
    template: templates/httproute.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: renders HTTPRoute with hostname, parentRef, and backend port when gateway is enabled
    template: templates/httproute.yaml
    set:
      ingress.gateway.enabled: true
      ingress.gateway.hostnames[0]: ha.example.com
    asserts:
      - isKind:
          of: HTTPRoute
      - equal:
          path: spec.hostnames[0]
          value: ha.example.com
      - equal:
          path: spec.parentRefs[0].name
          value: my-gateway
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 8123
      - equal:
          path: spec.rules[0].matches[0].path.type
          value: PathPrefix

  - it: does not render an IngressRoute when traefik is disabled
    template: templates/ingressroute.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: renders IngressRoute with host rule, entryPoints, and certResolver TLS when traefik is enabled
    template: templates/ingressroute.yaml
    set:
      ingress.traefik.enabled: true
      ingress.traefik.entryPoints[0]: websecure
      ingress.traefik.hostnames[0]: ha.example.com
      ingress.traefik.tls.enabled: true
      ingress.traefik.tls.certResolver: letsencrypt
    asserts:
      - isKind:
          of: IngressRoute
      - equal:
          path: spec.routes[0].match
          value: "Host(`ha.example.com`)"
      - notExists:
          path: spec.routes[0].kind
      - contains:
          path: spec.entryPoints
          content: websecure
      - equal:
          path: spec.tls.certResolver
          value: letsencrypt
      - notExists:
          path: spec.tls.secretName

  - it: renders middleware entries in IngressRoute with and without namespace
    template: templates/ingressroute.yaml
    set:
      ingress.traefik.enabled: true
      ingress.traefik.entryPoints[0]: websecure
      ingress.traefik.hostnames[0]: ha.example.com
      ingress.traefik.middlewares:
        - name: my-auth
        - name: my-ns-auth
          namespace: traefik
    asserts:
      - equal:
          path: spec.routes[0].middlewares[0].name
          value: my-auth
      - notExists:
          path: spec.routes[0].middlewares[0].namespace
      - equal:
          path: spec.routes[0].middlewares[1].name
          value: my-ns-auth
      - equal:
          path: spec.routes[0].middlewares[1].namespace
          value: traefik
