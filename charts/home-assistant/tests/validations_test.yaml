suite: Validations
templates:
  - templates/validations.yaml
tests:
  - it: renders no documents with default values
    asserts:
      - hasDocuments:
          count: 0

  - it: fails when gateway ingress is enabled but networking.service.app is disabled
    set:
      ingress.gateway.enabled: true
      networking.service.app.enabled: false
    asserts:
      - failedTemplate:
          errorMessage: "ingress.gateway requires networking.service.app to be enabled"

  - it: fails when traefik ingress is enabled but networking.service.app is disabled
    set:
      ingress.traefik.enabled: true
      networking.service.app.enabled: false
    asserts:
      - failedTemplate:
          errorMessage: "ingress.traefik requires networking.service.app to be enabled"

  - it: fails when both gateway and traefik ingress are enabled simultaneously
    set:
      ingress.gateway.enabled: true
      ingress.traefik.enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "Only one ingress mechanism may be enabled at a time (ingress.gateway or ingress.traefik)"

  - it: fails when traefik tls is enabled without secretName or certResolver
    set:
      ingress.traefik.tls.enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "ingress.traefik.tls.enabled requires either ingress.traefik.tls.secretName or ingress.traefik.tls.certResolver to be set"

  - it: does not fail when traefik tls is enabled with secretName
    set:
      ingress.traefik.tls.enabled: true
      ingress.traefik.tls.secretName: my-tls-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: fails when configuration is enabled without config
    set:
      homeAssistant.configuration.enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "homeAssistant.configuration.config must be set when homeAssistant.configuration.enabled is true"

  - it: fails when configuration is enabled with an empty config map
    set:
      homeAssistant.configuration.enabled: true
      homeAssistant.configuration.config: {}
    asserts:
      - failedTemplate:
          errorMessage: "homeAssistant.configuration.config must be set when homeAssistant.configuration.enabled is true"

  - it: fails when configuration is enabled without persistence
    set:
      homeAssistant.configuration.enabled: true
      homeAssistant.configuration.config:
        homeassistant:
          name: Home
      persistence.enabled: false
    asserts:
      - failedTemplate:
          errorMessage: "homeAssistant.configuration.enabled requires persistence.enabled; the init container copies configuration.yaml into the PVC at /config/configuration.yaml"

  - it: fails when checkConfig is enabled without configuration enabled
    set:
      homeAssistant.configuration.enabled: false
      homeAssistant.configuration.checkConfig.enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "homeAssistant.configuration.checkConfig.enabled requires homeAssistant.configuration.enabled to be true"

  - it: fails when existingClaim and existingVolume are both set
    set:
      persistence.existingClaim: my-pvc
      persistence.existingVolume: my-pv
    asserts:
      - failedTemplate:
          errorMessage: "persistence.existingClaim and persistence.existingVolume are mutually exclusive; set at most one"

  - it: fails when existingClaim is set but persistence is disabled
    set:
      persistence.enabled: false
      persistence.existingClaim: my-pvc
    asserts:
      - failedTemplate:
          errorMessage: "persistence.existingClaim has no effect when persistence.enabled is false; set persistence.enabled: true"

  - it: fails when existingVolume is set but persistence is disabled
    set:
      persistence.enabled: false
      persistence.existingVolume: my-pv
    asserts:
      - failedTemplate:
          errorMessage: "persistence.existingVolume has no effect when persistence.enabled is false; set persistence.enabled: true"

  - it: fails when replicaCount > 1 with ReadWriteOnce storage
    set:
      replicaCount: 2
    asserts:
      - failedTemplate:
          errorMessage: "replicaCount > 1 is incompatible with ReadWriteOnce storage; use ReadWriteMany or set replicaCount: 1"

  - it: does not fail when replicaCount > 1 with ReadWriteMany storage
    set:
      replicaCount: 2
      persistence.accessModes:
        - ReadWriteMany
    asserts:
      - hasDocuments:
          count: 0

  - it: fails when setupHACS is enabled without persistence
    set:
      homeAssistant.initContainer.tasks.setupHACS.enabled: true
      homeAssistant.initContainer.tasks.setupHACS.version: "2.0.1"
      persistence.enabled: false
    asserts:
      - failedTemplate:
          errorMessage: "homeAssistant.initContainer.tasks.setupHACS requires persistence.enabled to be true"

  - it: fails when setupHACS is enabled without version
    set:
      homeAssistant.initContainer.tasks.setupHACS.enabled: true
      homeAssistant.initContainer.tasks.setupHACS.version: ""
    asserts:
      - failedTemplate:
          errorMessage: "homeAssistant.initContainer.tasks.setupHACS.version must be set when setupHACS is enabled"

  - it: fails when setupSecretsYaml is enabled without secretName
    set:
      homeAssistant.initContainer.tasks.setupSecretsYaml.enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "homeAssistant.initContainer.tasks.setupSecretsYaml.secretName must be set when setupSecretsYaml is enabled"

  - it: fails when setupSecretsYaml is enabled without persistence
    set:
      homeAssistant.initContainer.tasks.setupSecretsYaml.enabled: true
      homeAssistant.initContainer.tasks.setupSecretsYaml.secretName: ha-secrets
      persistence.enabled: false
    asserts:
      - failedTemplate:
          errorMessage: "homeAssistant.initContainer.tasks.setupSecretsYaml requires persistence.enabled to be true"

  - it: fails when secretVolumeMounts has duplicate volume names
    set:
      secretVolumeMounts:
        - secretName: my-secret
        - secretName: my-secret
    asserts:
      - failedTemplate:
          errorMessage: 'secretVolumeMounts: duplicate volume name "my-secret"; set a unique .name on one of the entries to disambiguate'

  - it: does not fail when secretVolumeMounts entries share secretName but have different names
    set:
      secretVolumeMounts:
        - secretName: my-secret
          mountPath: path-a
        - secretName: my-secret
          name: my-secret-b
          mountPath: path-b
    asserts:
      - hasDocuments:
          count: 0

  - it: fails when setupSecretsYaml.secretName is also listed in secretVolumeMounts
    set:
      homeAssistant.initContainer.tasks.setupSecretsYaml.enabled: true
      homeAssistant.initContainer.tasks.setupSecretsYaml.secretName: ha-secrets
      secretVolumeMounts:
        - secretName: ha-secrets
    asserts:
      - failedTemplate:
          errorMessage: 'secretVolumeMounts: secret "ha-secrets" is already used by homeAssistant.initContainer.tasks.setupSecretsYaml to generate /config/secrets.yaml; remove it from secretVolumeMounts'

  - it: fails when user initContainers uses a reserved name
    set:
      initContainers:
        - name: bootstrap
          image: busybox:latest
          command: ["sh", "-c", "echo hi"]
    asserts:
      - failedTemplate:
          errorMessage: 'initContainers: name "bootstrap" is reserved by the chart; rename your init container'

  - it: fails when gitops is enabled without knownHosts
    set:
      homeAssistant.gitops.enabled: true
      homeAssistant.gitops.knownHosts: ""
    asserts:
      - failedTemplate:
          errorMessage: "homeAssistant.gitops.knownHosts must be set when gitops is enabled"

  - it: fails when gitops is enabled without sshKeySecret
    set:
      homeAssistant.gitops.enabled: true
      homeAssistant.gitops.knownHosts: "github.com ssh-ed25519 AAAA..."
      homeAssistant.gitops.sshKeySecret: ""
      homeAssistant.gitops.repos:
        - name: ha-config
          url: "git@github.com:example/ha-config.git"
    asserts:
      - failedTemplate:
          errorMessage: "homeAssistant.gitops.sshKeySecret must be set when gitops is enabled"

  - it: fails when gitops is enabled without repos
    set:
      homeAssistant.gitops.enabled: true
      homeAssistant.gitops.knownHosts: "github.com ssh-ed25519 AAAA..."
      homeAssistant.gitops.sshKeySecret: ha-gitops-ssh
      homeAssistant.gitops.repos: []
    asserts:
      - failedTemplate:
          errorMessage: "homeAssistant.gitops.repos must have at least one entry when gitops is enabled"

  - it: fails when gitops is enabled without persistence
    set:
      homeAssistant.gitops.enabled: true
      homeAssistant.gitops.knownHosts: "github.com ssh-ed25519 AAAA..."
      homeAssistant.gitops.sshKeySecret: ha-gitops-ssh
      homeAssistant.gitops.repos:
        - name: ha-config
          url: "git@github.com:example/ha-config.git"
      persistence.enabled: false
    asserts:
      - failedTemplate:
          errorMessage: "homeAssistant.gitops.enabled requires persistence.enabled to be true"

  - it: fails when traefik ingress is enabled with empty hostnames
    set:
      ingress.traefik.enabled: true
      ingress.traefik.hostnames: []
    asserts:
      - failedTemplate:
          errorMessage: "ingress.traefik.hostnames must have at least one entry when traefik ingress is enabled"

  - it: fails when gateway ingress is enabled with empty hostnames
    set:
      ingress.gateway.enabled: true
      ingress.gateway.hostnames: []
    asserts:
      - failedTemplate:
          errorMessage: "ingress.gateway.hostnames must have at least one entry when gateway ingress is enabled"

  - it: fails when gateway ingress is enabled but http port is absent
    set:
      ingress.gateway.enabled: true
      networking.service.app.ports.http: null
      networking.service.app.ports.other.port: 9090
      networking.service.app.ports.other.protocol: TCP
    asserts:
      - failedTemplate:
          errorMessage: "ingress.gateway requires networking.service.app.ports.http to be defined"

  - it: fails when traefik ingress is enabled but http port is absent
    set:
      ingress.traefik.enabled: true
      ingress.traefik.hostnames[0]: ha.example.com
      networking.service.app.ports.http: null
      networking.service.app.ports.other.port: 9090
      networking.service.app.ports.other.protocol: TCP
    asserts:
      - failedTemplate:
          errorMessage: "ingress.traefik requires networking.service.app.ports.http to be defined"

  - it: fails when monitor port does not exist in any service
    set:
      monitor.metric.enabled: true
      monitor.metric.port: nonexistent
    asserts:
      - failedTemplate:
          errorMessage: 'monitor.metric.port "nonexistent" is not defined in any enabled service in networking.service'

  - it: does not fail when monitor port matches an existing service port
    set:
      monitor.metric.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: fails when monitor port matches only a disabled service port
    set:
      monitor.metric.enabled: true
      networking.service.app.ports.http.enabled: false
      networking.service.app.ports.other.port: 9090
      networking.service.app.ports.other.protocol: TCP
    asserts:
      - failedTemplate:
          errorMessage: 'monitor.metric.port "http" is not defined in any enabled service in networking.service'

  - it: fails when an enabled service has all ports explicitly disabled
    set:
      networking.service.app.ports.http.enabled: false
    asserts:
      - failedTemplate:
          errorMessage: "networking.service.app is enabled but has no enabled ports; enable at least one port or disable the service"

  - it: does not fail when a service is disabled even if all its ports are disabled
    set:
      networking.service.app.enabled: false
    asserts:
      - hasDocuments:
          count: 0
