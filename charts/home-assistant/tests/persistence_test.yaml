suite: Persistence
templates:
  - templates/statefulset.yaml
tests:
  - it: creates a VolumeClaimTemplate named config with default access mode when persistence is enabled
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].metadata.name
          value: config
      - equal:
          path: spec.volumeClaimTemplates[0].spec.accessModes[0]
          value: ReadWriteOnce

  - it: mounts an existing PVC as a volume instead of creating a VolumeClaimTemplate
    set:
      persistence.existingClaim: my-existing-pvc
    asserts:
      - notExists:
          path: spec.volumeClaimTemplates
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config
            persistentVolumeClaim:
              claimName: my-existing-pvc

  - it: sets volumeName and storageClassName empty string in VolumeClaimTemplate when existingVolume is specified
    set:
      persistence.existingVolume: my-existing-pv
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].spec.volumeName
          value: my-existing-pv
      - equal:
          path: spec.volumeClaimTemplates[0].spec.storageClassName
          value: ""

  - it: sets storageClassName in VolumeClaimTemplate when storageClass is specified
    set:
      persistence.storageClass: local-path
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].spec.storageClassName
          value: local-path

  - it: user-supplied persistence.labels are merged alongside chart labels; chart labels win on conflict
    set:
      persistence.labels:
        environment: production
        app.kubernetes.io/managed-by: my-tool
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].metadata.labels["environment"]
          value: production
      - equal:
          path: spec.volumeClaimTemplates[0].metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
