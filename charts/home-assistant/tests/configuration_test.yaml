suite: Configuration
templates:
  - templates/statefulset.yaml
  - templates/configmap-configuration.yaml
tests:
  - it: renders configuration ConfigMap with configuration.yaml key
    template: templates/configmap-configuration.yaml
    set:
      homeAssistant.configuration.enabled: true
      homeAssistant.configuration.config:
        homeassistant:
          name: Home
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: metadata.name
          pattern: -configuration$
      - equal:
          path: data["configuration.yaml"]
          value: |
            homeassistant:
              name: Home

  - it: does not render configuration ConfigMap when disabled
    template: templates/configmap-configuration.yaml
    set:
      homeAssistant.configuration.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: bootstrap init container mounts bootstrap config read-only and sets CONFIG_ENABLED; ConfigMap volume not in main container
    template: templates/statefulset.yaml
    set:
      homeAssistant.configuration.enabled: true
      homeAssistant.configuration.config:
        homeassistant:
          name: Home
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: bootstrap
      - contains:
          path: spec.template.spec.initContainers[0].volumeMounts
          content:
            name: ha-bootstrap-config
            mountPath: /run/ha-bootstrap-config
            readOnly: true
      - contains:
          path: spec.template.spec.initContainers[0].volumeMounts
          content:
            name: config
            mountPath: /config
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: ha-bootstrap-config
