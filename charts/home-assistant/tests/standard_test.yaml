suite: Standard
templates:
  - templates/statefulset.yaml
  - templates/service.yaml
tests:
  - it: renders a StatefulSet with minimal config
    template: templates/statefulset.yaml
    values:
      - fixtures/minimal-values.yaml
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/home-assistant/home-assistant:2026.5
      - notExists:
          path: spec.template.spec.initContainers
      - equal:
          path: spec.volumeClaimTemplates[0].metadata.name
          value: config
      - equal:
          path: spec.template.spec.hostNetwork
          value: false
      - notExists:
          path: spec.template.spec.dnsPolicy

  - it: renders a fully-configured StatefulSet with all features enabled
    template: templates/statefulset.yaml
    values:
      - fixtures/full-values.yaml
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].spec.storageClassName
          value: local-path
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: config
            mountPath: /config

  - it: uses digest over tag for the main image when both are set
    template: templates/statefulset.yaml
    set:
      global.image.tag: "2026.5"
      global.image.digest: "sha256:abc123"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/home-assistant/home-assistant@sha256:abc123

  - it: sets dnsPolicy to ClusterFirstWithHostNet when hostNetwork is enabled
    template: templates/statefulset.yaml
    set:
      pod.hostNetwork: true
    asserts:
      - equal:
          path: spec.template.spec.hostNetwork
          value: true
      - equal:
          path: spec.template.spec.dnsPolicy
          value: ClusterFirstWithHostNet
