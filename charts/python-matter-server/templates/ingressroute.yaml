{{- if and .Values.ingress.gateway.enabled .Values.ingress.traefik.enabled }}
{{- fail "Only one ingress mechanism may be enabled at a time (ingress.gateway or ingress.traefik)" }}
{{- end }}
{{- if .Values.ingress.traefik.enabled }}
{{- if not .Values.networking.service.websocket.enabled }}
{{- fail "ingress requires networking.service.websocket to be enabled" }}
{{- end }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "python-matter-server.fullname" . }}
  labels:
    {{- include "python-matter-server.labels" . | nindent 4 }}
spec:
  entryPoints:
    {{- toYaml .Values.ingress.traefik.entryPoints | nindent 4 }}
  routes:
    - match: Host(`{{ first .Values.ingress.traefik.hostnames }}`)
      kind: Rule
      services:
        - name: {{ printf "%s-ws" (include "python-matter-server.fullname" .) }}
          port: ws
      {{- with .Values.ingress.traefik.middlewares }}
      middlewares:
        {{- range . }}
        - name: {{ .name }}
          {{- if .namespace }}
          namespace: {{ .namespace }}
          {{- end }}
        {{- end }}
      {{- end }}
  {{- if .Values.ingress.traefik.tls.enabled }}
  tls:
    {{- if .Values.ingress.traefik.tls.secretName }}
    secretName: {{ .Values.ingress.traefik.tls.secretName }}
    {{- else if .Values.ingress.traefik.tls.certResolver }}
    certResolver: {{ .Values.ingress.traefik.tls.certResolver }}
    {{- end }}
  {{- end }}
{{- end }}
