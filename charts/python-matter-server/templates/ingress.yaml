{{- if .Values.networking.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "python-matter-server.fullname" . }}
  labels:
    {{- include "python-matter-server.labels" . | nindent 4 }}
  {{- with .Values.networking.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.networking.ingress.className }}
  {{- if .Values.networking.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.networking.ingress.host }}
      secretName: {{ .Values.networking.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.networking.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "python-matter-server.fullname" . }}
                port:
                  name: ws
{{- end }}
