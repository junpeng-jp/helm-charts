apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "python-matter-server.fullname" . }}
  labels:
    {{- include "python-matter-server.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "python-matter-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "python-matter-server.selectorLabels" . | nindent 8 }}
      {{- with .Values.pod.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      hostNetwork: {{ .Values.pod.hostNetwork }}
      {{- if .Values.pod.dnsPolicy }}
      dnsPolicy: {{ .Values.pod.dnsPolicy }}
      {{- else if .Values.pod.hostNetwork }}
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      serviceAccountName: {{ include "python-matter-server.serviceAccountName" . }}
      {{- with .Values.global.image.pullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: python-matter-server
          image: {{ include "python-matter-server.image" . }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          args:
            - --storage-path
            - /data
            - --paa-root-cert-dir
            - /data/paa-root-certs
            - --port
            - {{ .Values.networking.service.websocket.ports.ws.port | quote }}
          ports:
            {{- range $svcName := keys .Values.networking.service | sortAlpha }}
            {{- $svc := index $.Values.networking.service $svcName }}
            {{- if $svc.enabled }}
            {{- range $portName := keys $svc.ports | sortAlpha }}
            {{- $port := index $svc.ports $portName }}
            {{- if (default true $port.enabled) }}
            - name: {{ $portName }}
              containerPort: {{ $port.port }}
              protocol: {{ $port.protocol }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- end }}
          {{- with .Values.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          # No HTTP health endpoint — probes omitted (WebSocket-only server)
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /data
            {{- end }}
            {{- range .Values.secretVolumeMounts }}
            - name: {{ .name | default .secretName }}
              mountPath: {{ .mountPath | default (printf "/run/secrets/%s" .secretName) }}
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- if or .Values.persistence.enabled .Values.secretVolumeMounts .Values.extraVolumes }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ if .Values.persistence.existingClaim }}{{ .Values.persistence.existingClaim }}{{ else }}{{ include "python-matter-server.fullname" . }}{{ end }}
        {{- end }}
        {{- range .Values.secretVolumeMounts }}
        - name: {{ .name | default .secretName }}
          secret:
            secretName: {{ .secretName }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.pod.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pod.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pod.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
