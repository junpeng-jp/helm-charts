{{- $svcType := "" -}}
{{- $ports := dict -}}
{{- if .Values.networking.service.clusterIp.enabled -}}
{{-   $svcType = "ClusterIP" -}}
{{-   $ports = .Values.networking.service.clusterIp.ports -}}
{{- else if .Values.networking.service.loadBalancer.enabled -}}
{{-   $svcType = "LoadBalancer" -}}
{{-   $ports = .Values.networking.service.loadBalancer.ports -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "python-matter-server.fullname" . }}
  labels:
    {{- include "python-matter-server.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "python-matter-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "python-matter-server.selectorLabels" . | nindent 8 }}
      {{- with .Values.pod.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      hostNetwork: {{ .Values.pod.hostNetwork }}
      {{- if .Values.pod.hostNetwork }}
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      serviceAccountName: {{ include "python-matter-server.serviceAccountName" . }}
      {{- $pullSecrets := concat .Values.global.imagePullSecrets .Values.image.pullSecrets }}
      {{- if $pullSecrets }}
      imagePullSecrets:
        {{- range $pullSecrets }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: python-matter-server
          image: {{ include "python-matter-server.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --storage-path
            - /data
            - --paa-root-cert-dir
            - /data/paa-root-certs
            - --port
            - {{ (index $ports "ws").port | quote }}
          ports:
            {{- range $name, $port := $ports }}
            {{- if ne (toString $port.enabled) "false" }}
            - name: {{ $name }}
              containerPort: {{ $port.port }}
              protocol: {{ $port.protocol }}
            {{- end }}
            {{- end }}
          {{- with .Values.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          # No HTTP health endpoint — probes omitted (WebSocket-only server)
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /data
            {{- end }}
            {{- range .Values.secretVolumeMounts }}
            - name: {{ .secretName }}
              mountPath: /run/secrets/{{ .secretName }}
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- if or .Values.persistence.enabled .Values.secretVolumeMounts .Values.extraVolumes }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ if .Values.persistence.existingClaim }}{{ .Values.persistence.existingClaim }}{{ else }}{{ include "python-matter-server.fullname" . }}{{ end }}
        {{- end }}
        {{- range .Values.secretVolumeMounts }}
        - name: {{ .secretName }}
          secret:
            secretName: {{ .secretName }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.pod.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pod.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pod.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
