{{- if and .Values.ingress.gateway.enabled .Values.ingress.traefik.enabled }}
{{- fail "Only one ingress mechanism may be enabled at a time (ingress.gateway or ingress.traefik)" }}
{{- end }}
{{- if .Values.ingress.gateway.enabled }}
{{- if not .Values.networking.service.websocket.enabled }}
{{- fail "ingress requires networking.service.websocket to be enabled" }}
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "python-matter-server.fullname" . }}
  labels:
    {{- include "python-matter-server.labels" . | nindent 4 }}
spec:
  parentRefs:
    {{- toYaml .Values.ingress.gateway.parentRefs | nindent 4 }}
  hostnames:
    {{- toYaml .Values.ingress.gateway.hostnames | nindent 4 }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ printf "%s-ws" (include "python-matter-server.fullname" .) }}
          port: ws
{{- end }}
