global:
  image:
    registry: ghcr.io
    repository: matter-js/python-matter-server
    tag: "8.1.2"
    digest: ""        # takes precedence over tag when set (e.g. sha256:abc123)
    pullPolicy: IfNotPresent
    pullSecrets: []

nameOverride: ""
fullnameOverride: ""

replicaCount: 1

serviceAccount:
  create: false
  name: ""
  annotations: {}

# Enable hostNetwork when running on overlay-network CNIs (e.g. k3s/Flannel) 
# that do not pass mDNS/Thread multicast into the pod network.
initContainers: []

env:
  - name: TZ
    value: UTC

secretVolumeMounts: []

extraVolumes: []
extraVolumeMounts: []

# No HTTP health endpoint — probes omitted (WebSocket-only server on port 5580)

resources:
  requests:
    memory: 128Mi
    cpu: 50m
  limits:
    memory: 512Mi
    # cpu intentionally omitted — matter commissioning can spike briefly

podSecurityContext: {}

containerSecurityContext: {}

pod:
  annotations: {}
  # Pin the pod to a specific node when hostNetwork is true so it always binds to the same
  # LAN interface. Also useful when a USB/Thread dongle is attached to a particular host.
  # Example: nodeSelector: { kubernetes.io/hostname: node-01 }
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # Set to true on overlay-network CNIs (e.g. k3s/Flannel) that do not pass mDNS/Thread
  # multicast into the pod network. See initContainers comment above for the recommended
  # companion settings. Pair with pod.nodeSelector to pin the pod to a consistent LAN interface.
  hostNetwork: false

networking:
  service:
    websocket:
      enabled: true
      type: LoadBalancer
      ports:
        ws:
          port: 5580
          protocol: TCP

ingress:
  gateway:
    enabled: false
    parentRefs:
      - name: my-gateway
        namespace: default
    hostnames:
      - matter.example.com

  traefik:
    enabled: false
    entryPoints:
      - websecure
    hostnames:
      - matter.example.com
    middlewares: []   # list of Traefik Middleware refs: [{name, namespace?}]
    tls:
      enabled: false
      secretName: ""
      certResolver: ""

persistence:
  enabled: true
  storageClass: ""        # "" uses the cluster default
  accessModes:
    - ReadWriteOnce
  size: 1Gi
  annotations: {}
  labels: {}
  existingClaim: ""

monitor:
  metric:
    enabled: false
    path: /metrics
    port: ws
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
