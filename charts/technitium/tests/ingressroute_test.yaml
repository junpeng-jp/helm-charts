suite: IngressRoute (Traefik)
templates:
  - templates/ingressroute.yaml
tests:
  - it: does not render when traefikIngress is disabled
    set:
      ingress.traefik.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders with host, entryPoints, and TLS certResolver when enabled
    set:
      ingress.traefik.enabled: true
      ingress.traefik.hostnames[0]: dns.example.com
      ingress.traefik.tls.enabled: true
      ingress.traefik.tls.certResolver: letsencrypt
    asserts:
      - isKind:
          of: IngressRoute
      - equal:
          path: spec.routes[0].match
          value: "Host(`dns.example.com`)"
      - equal:
          path: spec.routes[0].services[0].port
          value: http
      - equal:
          path: spec.tls.certResolver
          value: letsencrypt
