suite: StatefulSet
templates:
  - templates/statefulset.yaml
tests:
  - it: renders a StatefulSet with realistic defaults
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: spec.template.spec.containers[0].image
          value: docker.io/technitium/dns-server:14.3.0
      - equal:
          path: spec.volumeClaimTemplates[0].metadata.name
          value: config
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: dns-tcp
            containerPort: 53
            protocol: TCP
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: log
            mountPath: /var/log/technitium
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: tmp
            mountPath: /tmp
      - contains:
          path: spec.template.spec.volumes
          content:
            name: log
            emptyDir: {}
      - contains:
          path: spec.template.spec.volumes
          content:
            name: tmp
            emptyDir: {}
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: fix-permissions
      - equal:
          path: spec.template.spec.initContainers[0].securityContext.runAsUser
          value: 0

  - it: omits the fix-permissions initContainer when fixPermissions is disabled
    set:
      persistence.fixPermissions.enabled: false
    asserts:
      - notExists:
          path: spec.template.spec.initContainers

  - it: uses digest over tag when both are set
    set:
      global.image.tag: "14.0.0"
      global.image.digest: "sha256:abc123"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: docker.io/technitium/dns-server@sha256:abc123

  - it: mounts existing PVC as volume instead of creating a VolumeClaimTemplate
    set:
      persistence.existingClaim: my-existing-pvc
    asserts:
      - notExists:
          path: spec.volumeClaimTemplates
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config
            persistentVolumeClaim:
              claimName: my-existing-pvc

  - it: sets storageClassName in VolumeClaimTemplate when specified
    set:
      persistence.storageClass: local-path
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].spec.storageClassName
          value: local-path

  - it: omits liveness and readiness probes when disabled
    set:
      livenessProbe.enabled: false
      readinessProbe.enabled: false
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].livenessProbe
      - notExists:
          path: spec.template.spec.containers[0].readinessProbe

  - it: uses fullnameOverride as complete resource name
    set:
      fullnameOverride: my-dns
    asserts:
      - equal:
          path: metadata.name
          value: my-dns

  - it: renders DNS_SERVER_DOMAIN env var from config.domain
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DNS_SERVER_DOMAIN
            value: dns-server

  - it: renders forwarder env vars when addresses are set
    set:
      config.forwarders.addresses:
        - 1.1.1.1
        - 8.8.8.8
      config.forwarders.protocol: Tls
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DNS_SERVER_FORWARDERS
            value: "1.1.1.1, 8.8.8.8"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DNS_SERVER_FORWARDER_PROTOCOL
            value: Tls

  - it: always mounts log and tmp emptyDirs even when persistence is disabled
    set:
      persistence.enabled: false
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: log
            emptyDir: {}
      - contains:
          path: spec.template.spec.volumes
          content:
            name: tmp
            emptyDir: {}
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: log
            mountPath: /var/log/technitium
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: tmp
            mountPath: /tmp

  - it: uses initImage digest over tag when both are set
    set:
      persistence.fixPermissions.image.tag: "1.36"
      persistence.fixPermissions.image.digest: "sha256:deadbeef"
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: busybox@sha256:deadbeef
