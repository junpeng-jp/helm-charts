suite: Service
templates:
  - templates/service.yaml
tests:
  - it: renders a LoadBalancer service with dashboard and DNS ports
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-technitium
      - equal:
          path: spec.type
          value: LoadBalancer
      - equal:
          path: spec.ports[0].name
          value: dns-tcp
      - equal:
          path: spec.ports[0].port
          value: 53
      - equal:
          path: spec.ports[1].name
          value: dns-udp
      - equal:
          path: spec.ports[1].port
          value: 53
      - equal:
          path: spec.ports[2].name
          value: http
      - equal:
          path: spec.ports[2].port
          value: 5380
      - equal:
          path: spec.selector["app.kubernetes.io/name"]
          value: technitium
      - equal:
          path: spec.selector["app.kubernetes.io/instance"]
          value: RELEASE-NAME
