suite: HTTPRoute (Gateway API)
templates:
  - templates/httproute.yaml
tests:
  - it: does not render when gateway ingress is disabled
    set:
      ingress.gateway.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders HTTPRoute with hostname and parentRef when enabled
    set:
      ingress.gateway.enabled: true
      ingress.gateway.hostnames[0]: dns.example.com
    asserts:
      - isKind:
          of: HTTPRoute
      - equal:
          path: spec.hostnames[0]
          value: dns.example.com
      - equal:
          path: spec.parentRefs[0].name
          value: my-gateway
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: http
