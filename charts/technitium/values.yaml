nameOverride: ""
fullnameOverride: ""

image:
  registry: docker.io
  repository: technitium/dns-server
  tag: ""           # defaults to Chart.AppVersion when empty
  digest: ""        # takes precedence over tag when set (e.g. sha256:abc123)
  pullPolicy: IfNotPresent
  pullSecrets: []

serviceAccount:
  create: false
  name: ""
  annotations: {}

initContainers: []

env: []

secretVolumeMounts: []

extraVolumes: []
extraVolumeMounts: []

livenessProbe:
  enabled: true
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 60
  periodSeconds: 30
  failureThreshold: 5
readinessProbe:
  enabled: true
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

podSecurityContext:
  runAsNonRoot: true

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE  # required to bind privileged DNS port 53

pod:
  annotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

networking:
  service:
    type: LoadBalancer
    port: 5380

  ingress:
    enabled: false
    className: nginx
    annotations: {}
    host: dns.example.com
    tls:
      enabled: false
      secretName: technitium-tls

  traefikIngress:
    enabled: false
    entryPoints:
      - websecure
    host: dns.example.com
    middlewares: []
    tls:
      enabled: false
      secretName: ""
      certResolver: ""

persistence:
  enabled: true
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 2Gi
  annotations: {}
  labels: {}
  existingClaim: ""

monitor:
  metric:
    enabled: false
    path: /metrics
    port: http
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

# DNS protocol ports — Technitium-specific.
dnsPorts:
  dns: 53         # DNS over UDP and TCP
  dot: 853        # DNS over TLS
  doh: 8053       # DNS over HTTPS (plain HTTP upstream)
  https: 53443    # DNS over HTTPS (TLS)
