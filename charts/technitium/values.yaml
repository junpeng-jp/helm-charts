global:
  image:
    registry: docker.io
    repository: technitium/dns-server
    tag: "14.3.0"           # pin the version to deploy; does not fall back to Chart.AppVersion
    digest: ""              # takes precedence over tag when set (e.g. sha256:abc123)
    pullPolicy: IfNotPresent
    pullSecrets: []

nameOverride: ""          # overrides chart name in resource names
fullnameOverride: ""      # replaces the full release-name + chart-name pattern

replicaCount: 1

serviceAccount:
  create: false
  name: ""      # defaults to fullname when create: true, "default" otherwise
  annotations: {}

initContainers: []

# Raw env passthrough — use for settings not modelled in config.
env: []

secretVolumeMounts: []

extraVolumes: []
extraVolumeMounts: []

livenessProbe:
  enabled: true
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 60
  periodSeconds: 30
  failureThreshold: 5
readinessProbe:
  enabled: true
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10004
  runAsGroup: 10004
  fsGroup: 10004
  sysctls: []
  # Recommended sysctl to expand the local port range (mirrors the docker-compose default):
  # sysctls:
  #   - name: net.ipv4.ip_local_port_range
  #     value: "1024 65535"

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE  # required to bind privileged DNS port 53

pod:
  annotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

networking:
  service:
    # Admin web portal — ClusterIP for ingress routing.
    main:
      enabled: true
      type: ClusterIP
      ports:
        http:
          port: 5380
          protocol: TCP
        # HTTPS web portal — enable together with config.webService.selfSignedCert or a TLS terminator.
        https:
          port: 53443    # DNS_SERVER_WEB_SERVICE_HTTPS_PORT
          protocol: TCP
          enabled: false
    # DNS traffic — LoadBalancer for direct external access.
    dns:
      enabled: true
      type: LoadBalancer
      ports:
        dns-udp:
          port: 53
          protocol: UDP
        dns-tcp:
          port: 53
          protocol: TCP
        # DNS over TLS
        dot:
          port: 853
          protocol: TCP
          enabled: false
        # DNS over QUIC
        doq:
          port: 853
          protocol: UDP
          enabled: false
        # DNS over HTTPS
        doh-tcp:
          port: 443
          protocol: TCP
          enabled: false
        doh-udp:
          port: 443
          protocol: UDP
          enabled: false
        # DNS over HTTP (plain, for reverse-proxy upstream)
        # enables DNS_SERVER_OPTIONAL_PROTOCOL_DNS_OVER_HTTP
        doh-plain:
          port: 8053
          protocol: TCP
          enabled: false

ingress:
  gateway:
    enabled: false
    parentRefs:
      - name: my-gateway
        namespace: default
    hostnames:
      - dns.example.com
    tls:
      enabled: false
      secretName: ""

  traefik:
    enabled: false
    entryPoints:
      - websecure
    hostnames:
      - dns.example.com
    middlewares: []
    tls:
      enabled: false
      secretName: ""
      certResolver: ""

persistence:
  enabled: true
  fixPermissions: true   # runs a built-in initContainer to chown /etc/dns; disable only if your storage class honours fsGroup reliably
  storageClass: ""      # "" uses cluster default
  accessModes:
    - ReadWriteOnce
  size: 2Gi
  annotations: {}
  labels: {}
  existingClaim: ""     # mount an existing PVC instead of creating one

monitor:
  metric:
    enabled: false
    path: /metrics
    port: http
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

# Technitium server configuration — rendered as container env vars.
# Use env[] for any setting not modelled here.
config:
  domain: dns-server    # DNS_SERVER_DOMAIN

  # To set the admin password, mount a secret via secretVolumeMounts and set:
  #   env:
  #     - name: DNS_SERVER_ADMIN_PASSWORD_FILE
  #       value: /run/secrets/<secretName>/password

  webService:
    selfSignedCert: false         # DNS_SERVER_WEB_SERVICE_USE_SELF_SIGNED_CERT
    httpToTlsRedirect: false      # DNS_SERVER_WEB_SERVICE_HTTP_TO_TLS_REDIRECT

  preferIPv6: false     # DNS_SERVER_PREFER_IPV6

  recursion:
    mode: AllowOnlyForPrivateNetworks   # DNS_SERVER_RECURSION: Allow | Deny | AllowOnlyForPrivateNetworks | UseSpecifiedNetworkACL
    networkACL: ""                      # DNS_SERVER_RECURSION_NETWORK_ACL (UseSpecifiedNetworkACL only)

  blocking:
    enabled: false          # DNS_SERVER_ENABLE_BLOCKING
    allowTxtReport: false   # DNS_SERVER_ALLOW_TXT_BLOCKING_REPORT
    blockListUrls: []       # DNS_SERVER_BLOCK_LIST_URLS

  forwarders:
    addresses: []   # DNS_SERVER_FORWARDERS
    protocol: Udp   # DNS_SERVER_FORWARDER_PROTOCOL: Udp | Tcp | Tls | Https | HttpsJson

  logging:
    useLocalTime: false   # DNS_SERVER_LOG_USING_LOCAL_TIME
    folderPath: ""        # DNS_SERVER_LOG_FOLDER_PATH (empty = Technitium default)
    maxLogFileDays: 0     # DNS_SERVER_LOG_MAX_LOG_FILE_DAYS (0 = Technitium default; use env[] to force 0)

  stats:
    enableInMemoryStats: false  # DNS_SERVER_STATS_ENABLE_IN_MEMORY_STATS
    maxStatFileDays: 0          # DNS_SERVER_STATS_MAX_STAT_FILE_DAYS (0 = Technitium default; use env[] to force 0)
