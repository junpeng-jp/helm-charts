{{- $port := 0 -}}
{{- if .Values.networking.service.clusterIp.enabled -}}
{{-   $port = .Values.networking.service.clusterIp.ports.http.port -}}
{{- else if .Values.networking.service.loadBalancer.enabled -}}
{{-   $port = .Values.networking.service.loadBalancer.ports.http.port -}}
{{- end -}}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "technitium.fullname" . }}-test-connection
  labels:
    {{- include "technitium.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: busybox
      command:
        - wget
        - --spider
        - -q
        - http://{{ include "technitium.fullname" . }}:{{ $port }}/
