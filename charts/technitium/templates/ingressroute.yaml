{{- if .Values.ingress.traefik.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "technitium.fullname" . }}
  labels:
    {{- include "technitium.labels" . | nindent 4 }}
spec:
  entryPoints:
    {{- toYaml .Values.ingress.traefik.entryPoints | nindent 4 }}
  routes:
    - match: Host(`{{ first .Values.ingress.traefik.hostnames }}`)
      kind: Rule
      services:
        - name: {{ include "technitium.fullname" . }}
          port: http
      {{- with .Values.ingress.traefik.middlewares }}
      middlewares:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
  {{- if .Values.ingress.traefik.tls.enabled }}
  tls:
    {{- if .Values.ingress.traefik.tls.secretName }}
    secretName: {{ .Values.ingress.traefik.tls.secretName }}
    {{- else if .Values.ingress.traefik.tls.certResolver }}
    certResolver: {{ .Values.ingress.traefik.tls.certResolver }}
    {{- end }}
  {{- end }}
{{- end }}
