name: Chart Testing

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Helm
        uses: azure/setup-helm@v4# Install helm-unittest plugin

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest.git

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v3.14.0

      - name: Detect chart changes
        id: detect-chart-changes
        run: |
          changed=$(ct list-changed --target-branch ${{ github.event.repository.default_branch }})
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changed charts: $changed"
          fi

      - name: Run helm-unittest
        if: steps.detect-chart-changes.outputs.changed == 'true'
        run: |
          for chart in $(ct list-changed --target-branch ${{ github.event.repository.default_branch }}); do
            # Only run if a tests directory exists to avoid errors
            if [ -d "$chart/tests" ]; then
              echo "Running unit tests for $chart..."
              helm unittest "$chart"
            else
              echo "No unit tests found for $chart, skipping."
            fi
          done

      - name: Run chart-testing (lint)
        if: steps.detect-chart-changes.outputs.changed == 'true'
        run: ct lint --config config/ct.yaml --target-branch ${{ github.event.repository.default_branch }}

      - name: Create kind cluster
        if: steps.list-changed.outputs.changed == 'true'
        uses: helm/kind-action@v1
        with:
          config: config/kind-config.yaml

      - name: Run chart-testing (install)
        if: steps.detect-chart-changes.outputs.changed == 'true'
        run: ct install --target-branch ${{ github.event.repository.default_branch }} --helm-extra-args "--timeout 10m"
