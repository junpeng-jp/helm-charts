name: Chart Testing

on:
  pull_request:
    branches:
      - main

jobs:
  lint-and-unit-test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/junpeng-jp/helm:1.0.0
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect chart changes
        id: detect-chart-changes
        run: |
          changed=$(ct list-changed --config config/ct.yaml --target-branch ${{ github.event.repository.default_branch }})
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changed charts: $changed"
          fi

      - name: Run helm-unittest
        if: steps.detect-chart-changes.outputs.changed == 'true'
        run: |
          for chart in $(ct list-changed --config config/ct.yaml --target-branch ${{ github.event.repository.default_branch }}); do
            if [ -d "$chart/tests" ]; then
              echo "Running unit tests for $chart..."
              helm unittest "$chart"
            else
              echo "No unit tests found for $chart, skipping."
            fi
          done

      - name: Run chart-testing (lint)
        if: steps.detect-chart-changes.outputs.changed == 'true'
        run: ct lint --config config/ct.yaml --target-branch ${{ github.event.repository.default_branch }}

  integration-test:
    needs: lint-and-unit-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2

      - name: Detect chart changes
        id: detect-chart-changes
        run: |
          changed=$(ct list-changed --config config/ct.yaml --target-branch ${{ github.event.repository.default_branch }})
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changed charts: $changed"
          fi

      - name: Create kind cluster
        if: steps.detect-chart-changes.outputs.changed == 'true'
        uses: helm/kind-action@v1
        with:
          config: config/kind-config.yaml

      - name: Run chart-testing (install)
        if: steps.detect-chart-changes.outputs.changed == 'true'
        run: ct install --config config/ct.yaml --target-branch ${{ github.event.repository.default_branch }}
