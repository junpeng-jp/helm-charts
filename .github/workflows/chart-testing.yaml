name: Chart Testing

on:
  pull_request:
    branches:
      - main

jobs:
  detect-chart-changes:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/junpeng-jp/helm:1.0.2
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      changed: ${{ steps.detect-chart-changes.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add github workspace as safe.directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Detect chart changes
        id: detect-chart-changes
        run: |
          changed=$(ct list-changed --config config/ct.yaml --target-branch ${{ github.event.repository.default_branch }})
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changed charts: $changed"
          fi

  lint:
    needs: detect-chart-changes
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/junpeng-jp/helm:1.0.2
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add github workspace as safe.directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Run chart-testing (lint)
        if: needs.detect-chart-changes.outputs.changed == 'true'
        run: ct lint --config config/ct.yaml --target-branch ${{ github.event.repository.default_branch }}

  unit-test:
    needs: detect-chart-changes
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/junpeng-jp/helm:1.0.2
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add github workspace as safe.directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Run helm-unittest
        if: needs.detect-chart-changes.outputs.changed == 'true'
        run: |
          for chart in $(ct list-changed --config config/ct.yaml --target-branch ${{ github.event.repository.default_branch }}); do
            if [ -d "$chart/tests" ]; then
              echo "Running unit tests for $chart..."
              helm unittest "$chart"
            else
              echo "No unit tests found for $chart, skipping."
            fi
          done

  integration-test:
    needs: [detect-chart-changes, lint, unit-test]
    # needs docker daemon for kind so skip using the CI image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        if: needs.detect-chart-changes.outputs.changed == 'true'
        uses: azure/setup-helm@v4
        with:
          version: "3.19.1"

      - name: Set up chart-testing
        if: needs.detect-chart-changes.outputs.changed == 'true'
        uses: helm/chart-testing-action@v2
        with:
          version: "3.14.0"

      - name: Create kind cluster
        if: needs.detect-chart-changes.outputs.changed == 'true'
        uses: helm/kind-action@v1
        with:
          config: config/kind-config.yaml

      - name: Install local-path-provisioner
        if: needs.detect-chart-changes.outputs.changed == 'true'
        run: kubectl apply -f https://raw.githubusercontent.com/rancher/local-path-provisioner/v0.0.35/deploy/local-path-storage.yaml

      - name: Run chart-testing (install)
        if: needs.detect-chart-changes.outputs.changed == 'true'
        run: ct install --config config/ct.yaml --target-branch ${{ github.event.repository.default_branch }}
